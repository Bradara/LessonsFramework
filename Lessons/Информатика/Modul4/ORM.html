<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORM & Entity Framework — 12. клас</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #060b18;
      --card: rgba(13, 18, 40, 0.85);
      --ms-blue: #0078d4;
      --cs-purple: #9b59d0;
      --accent-green: #00d4aa;
      --accent-amber: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .bg-fixed-img {
      position: fixed; inset: 0;
      background-image: url('https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=1920&q=80');
      background-size: cover;
      background-position: center;
      opacity: 0.12;
      z-index: -2;
    }
    .bg-overlay {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 10% 0%, rgba(0,120,212,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 90% 100%, rgba(155,89,208,0.25) 0%, transparent 55%),
        linear-gradient(180deg, rgba(6,11,24,0.7) 0%, rgba(6,11,24,0.97) 100%);
      z-index: -1;
    }

    /* ── Glass card ── */
    .glass {
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    /* ── Nav tabs ── */
    .nav-tab {
      transition: all 0.25s ease;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: #94a3b8;
      font-size: 0.82rem;
      padding: 0.55rem 1.1rem;
      white-space: nowrap;
    }
    .nav-tab:hover { color: #e2e8f0; background: rgba(255,255,255,0.04); }
    .nav-tab.active {
      border-bottom-color: var(--ms-blue);
      color: #60a5fa;
      background: rgba(0,120,212,0.1);
    }

    /* ── Slide transitions ── */
    .slide-enter { animation: slideIn 0.35s cubic-bezier(.4,0,.2,1) both; }
    .slide-exit  { animation: slideOut 0.25s cubic-bezier(.4,0,.2,1) both; }
    @keyframes slideIn  { from { opacity:0; transform: translateX(32px); } to { opacity:1; transform: none; } }
    @keyframes slideOut { from { opacity:1; transform: none; } to { opacity:0; transform: translateX(-32px); } }

    /* ── Pulse badge ── */
    .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-green);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(0,212,170,.6); } 50% { box-shadow: 0 0 0 7px rgba(0,212,170,0); } }

    /* ── Code block ── */
    .code-block {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.82rem;
      line-height: 1.65;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(0,120,212,0.25);
      border-radius: 10px;
      padding: 1.2rem 1.4rem;
      overflow-x: auto;
    }
    .kw  { color: #569cd6; }
    .ty  { color: #4ec9b0; }
    .st  { color: #ce9178; }
    .cm  { color: #6a9955; }
    .nm  { color: #dcdcaa; }
    .id  { color: #9cdcfe; }
    .op  { color: #d4d4d4; }
    .pu  { color: #c586c0; }

    /* ── Mapper game ── */
    .mapper-item {
      cursor: grab;
      transition: all 0.2s ease;
      border: 2px solid rgba(255,255,255,0.1);
      user-select: none;
    }
    .mapper-item:hover { border-color: rgba(0,120,212,0.6); transform: scale(1.02); }
    .mapper-item.dragging { opacity: 0.5; transform: scale(0.97); }
    .mapper-item.matched-correct { border-color: #22c55e; background: rgba(34,197,94,0.12); }
    .mapper-item.matched-wrong   { border-color: #ef4444; background: rgba(239,68,68,0.12); animation: shake 0.4s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    .drop-zone {
      min-height: 54px;
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 10px;
      transition: all 0.2s ease;
    }
    .drop-zone.over { border-color: var(--ms-blue); background: rgba(0,120,212,0.08); }
    .drop-zone.filled-correct { border-color: #22c55e; border-style: solid; background: rgba(34,197,94,0.08); }
    .drop-zone.filled-wrong   { border-color: #ef4444; border-style: solid; }

    /* ── Quiz ── */
    .quiz-btn {
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
    }
    .quiz-btn:hover:not(.answered) { border-color: rgba(0,120,212,0.6); background: rgba(0,120,212,0.1); }
    .quiz-btn.correct  { border-color: #22c55e; background: rgba(34,197,94,0.12); color: #86efac; }
    .quiz-btn.wrong    { border-color: #ef4444; background: rgba(239,68,68,0.1);  color: #fca5a5; }
    .quiz-btn.reveal   { border-color: #22c55e; background: rgba(34,197,94,0.07); color: #86efac; }

    /* ── Progress bar ── */
    .progress-track {
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--ms-blue), var(--cs-purple));
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
    }

    /* ── Glossary ── */
    .glossary-card {
      transition: all 0.25s ease;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .glossary-card:hover { border-color: rgba(155,89,208,0.5); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    /* ── Badge ── */
    .badge {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 99px;
      text-transform: uppercase;
    }
    .badge-blue   { background: rgba(0,120,212,0.2);  color: #60a5fa; border: 1px solid rgba(0,120,212,0.4); }
    .badge-purple { background: rgba(155,89,208,0.2); color: #c084fc; border: 1px solid rgba(155,89,208,0.4); }
    .badge-green  { background: rgba(0,212,170,0.15); color: #34d399; border: 1px solid rgba(0,212,170,0.35); }
    .badge-amber  { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.35); }

    /* ── Fade in ── */
    .fade-in { animation: fadeIn 0.5s ease both; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: none; } }

    /* ── Icon circle ── */
    .icon-circle {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    /* ── Step card ── */
    .step-card {
      border-left: 3px solid var(--ms-blue);
      background: rgba(0,120,212,0.05);
      border-radius: 8px;
      padding: 0.9rem 1.1rem;
    }

    /* ── Table comparison ── */
    .compare-col {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
    }
    .compare-header {
      padding: 0.7rem 1rem;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .nav-tab { padding: 0.45rem 0.65rem; font-size: 0.74rem; }
      .code-block { font-size: 0.73rem; }
    }
  </style>
</head>

    function MapperGame() {
      const [shuffled, setShuffled] = useState(() => [...MAPPER_PAIRS].sort(() => Math.random()-0.5));
      const [drops, setDrops] = useState({}); // zone id → pair id
      const [dragging, setDragging] = useState(null);
      const [checked, setChecked] = useState(false);
      const [score, setScore] = useState(null);

      const reset = () => {
        setShuffled([...MAPPER_PAIRS].sort(() => Math.random()-0.5));
        setDrops({});
        setDragging(null);
        setChecked(false);
        setScore(null);
      };

      const handleDragStart = (id) => setDragging(id);
      const handleDragEnd = () => setDragging(null);
      const handleDrop = (zoneId, e) => {
        e.preventDefault();
        if (dragging !== null) {
          setDrops(prev => {
            const next = {...prev};
            // Remove from any existing zone
            Object.keys(next).forEach(k => { if (next[k] === dragging) delete next[k]; });
            next[zoneId] = dragging;
            return next;
          });
          setDragging(null);
        }
      };

      const check = () => {
        let s = 0;
        MAPPER_PAIRS.forEach(p => { if (drops[p.id] === p.id) s++; });
        setScore(s);
        setChecked(true);
      };

      const droppedIds = Object.values(drops);
      const remaining = shuffled.filter(p => !droppedIds.includes(p.id));

      return (
        <section className="fade-in">
          <div className="flex items-center gap-3 mb-2">
            <div className="pulse-dot" style={{background:'#a78bfa'}}/>
            <h2 className="text-xl font-bold text-white">Игра: Mapper Matcher</h2>
            <span className="badge badge-purple ml-auto">Мини-игра</span>
          </div>
          <p className="text-slate-400 text-sm mb-5">
            Провлечи (drag & drop) понятието от ООП модела към правилния термин от релационния модел.
          </p>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {/* Left: Draggable OOP terms */}
            <div>
              <p className="text-purple-400 font-semibold text-sm mb-3 flex items-center gap-2">⚙️ ООП термини <span className="text-slate-500 font-normal">(провлечи)</span></p>
              <div className="space-y-2 min-h-20">
                {remaining.map(p => (
                  <div key={p.id}
                    draggable
                    onDragStart={() => handleDragStart(p.id)}
                    onDragEnd={handleDragEnd}
                    className={`mapper-item glass rounded-xl px-4 py-3 text-sm text-purple-300 font-medium select-none ${dragging===p.id ? 'dragging' : ''}`}
                  >
                    {p.oop}
                  </div>
                ))}
                {remaining.length === 0 && (
                  <div className="text-slate-500 text-sm text-center py-4">Всички термини са поставени ✓</div>
                )}
              </div>
            </div>

            {/* Right: Drop zones */}
            <div>
              <p className="text-blue-400 font-semibold text-sm mb-3 flex items-center gap-2">🗄️ Релационни термини <span className="text-slate-500 font-normal">(зони за пускане)</span></p>
              <div className="space-y-2">
                {MAPPER_PAIRS.map(p => {
                  const droppedId = drops[p.id];
                  const droppedPair = droppedId !== undefined ? MAPPER_PAIRS.find(x => x.id === droppedId) : null;
                  const isCorrect = checked && droppedId === p.id;
                  const isWrong   = checked && droppedId !== undefined && droppedId !== p.id;
                  return (
                    <div key={p.id}
                      onDragOver={e => e.preventDefault()}
                      onDrop={e => handleDrop(p.id, e)}
                      className={`drop-zone glass rounded-xl px-4 flex items-center gap-3 ${isCorrect ? 'filled-correct' : isWrong ? 'filled-wrong' : ''}`}
                    >
                      <span className="text-blue-300 text-sm font-medium flex-1">{p.relational}</span>
                      <span className="text-slate-600 text-xs">→</span>
                      <span className={`text-sm font-medium flex-1 text-right ${isCorrect ? 'text-emerald-400' : isWrong ? 'text-red-400' : 'text-slate-500'}`}>
                        {droppedPair ? droppedPair.oop : <span className="italic">пусни тук...</span>}
                      </span>
                      {isCorrect && <span className="text-emerald-400">✓</span>}
                      {isWrong   && <span className="text-red-400">✗</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <div className="flex gap-3 mt-5 flex-wrap">
            <button onClick={check} disabled={Object.keys(drops).length < MAPPER_PAIRS.length}
              className="px-5 py-2.5 rounded-xl font-semibold text-sm transition-all"
              style={{
                background: Object.keys(drops).length < MAPPER_PAIRS.length ? 'rgba(255,255,255,0.05)' : 'rgba(0,120,212,0.3)',
                border: '1px solid rgba(0,120,212,0.4)',
                color: Object.keys(drops).length < MAPPER_PAIRS.length ? '#475569' : '#60a5fa',
                cursor: Object.keys(drops).length < MAPPER_PAIRS.length ? 'not-allowed' : 'pointer',
              }}>
              ✔ Провери
            </button>
            <button onClick={reset}
              className="px-5 py-2.5 rounded-xl font-semibold text-sm transition-all"
              style={{background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', color:'#94a3b8'}}>
              🔄 Нова игра
            </button>

            {checked && score !== null && (
              <div className={`ml-auto px-5 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 fade-in`}
                style={{
                  background: score === MAPPER_PAIRS.length ? 'rgba(34,197,94,0.15)' : 'rgba(245,158,11,0.12)',
                  border: `1px solid ${score === MAPPER_PAIRS.length ? '#22c55e' : '#f59e0b'}`,
                  color: score === MAPPER_PAIRS.length ? '#4ade80' : '#fbbf24',
                }}>
                {score === MAPPER_PAIRS.length ? '🎉' : '📖'} {score}/{MAPPER_PAIRS.length} верни
              </div>
            )}
          </div>
        </section>
      );
    }

    /* ═══════════════════════════════ Quiz ════════════════════════════════ */
    function Quiz() {
      const [current, setCurrent] = useState(0);
      const [answers, setAnswers] = useState({});
      const [finished, setFinished] = useState(false);

      const q = QUIZ_QUESTIONS[current];
      const answered = answers[current] !== undefined;
      const chosen   = answers[current];

      const pick = (idx) => {
        if (!answered) setAnswers(prev => ({...prev, [current]: idx}));
      };

      const next = () => {
        if (current < QUIZ_QUESTIONS.length - 1) setCurrent(c => c+1);
        else setFinished(true);
      };

      const restart = () => { setAnswers({}); setCurrent(0); setFinished(false); };

      const score = Object.entries(answers).filter(([qi, ai]) => QUIZ_QUESTIONS[+qi].correct === ai).length;
      const progress = ((current + (answered ? 1 : 0)) / QUIZ_QUESTIONS.length) * 100;

      if (finished) {
        const pct = Math.round((score / QUIZ_QUESTIONS.length) * 100);
        const grade = pct >= 90 ? {l:'Отличен! 🏆', c:'text-yellow-400'} : pct >= 70 ? {l:'Много добър! 🎉', c:'text-emerald-400'} : pct >= 50 ? {l:'Добър 💪', c:'text-blue-400'} : {l:'Нужна е повече практика 📖', c:'text-amber-400'};
        return (
          <section className="fade-in text-center py-8">
            <div className="text-6xl mb-4">{pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '💪' : '📖'}</div>
            <h2 className="text-3xl font-bold text-white mb-2">{grade.l}</h2>
            <p className={`text-5xl font-black mb-1 ${grade.c}`}>{score}<span className="text-2xl text-slate-400">/{QUIZ_QUESTIONS.length}</span></p>
            <p className="text-slate-400 text-sm mb-6">{pct}% верни отговора</p>
            <div className="progress-track max-w-xs mx-auto mb-6">
              <div className="progress-fill" style={{width:`${pct}%`}}/>
            </div>

            {/* Review */}
            <div className="text-left space-y-3 mb-6 max-w-2xl mx-auto">
              {QUIZ_QUESTIONS.map((qq, i) => {
                const a = answers[i];
                const ok = a === qq.correct;
                return (
                  <div key={i} className="glass rounded-xl p-4" style={{borderColor: ok ? 'rgba(34,197,94,0.25)' : 'rgba(239,68,68,0.25)'}}>
                    <p className="font-semibold text-sm text-white mb-1">{i+1}. {qq.q}</p>
                    <p className="text-xs text-slate-400 mb-1">
                      Твой отговор: <span className={ok ? 'text-emerald-400' : 'text-red-400'}>{qq.opts[a]}</span>
                      {!ok && <> | Верен: <span className="text-emerald-400">{qq.opts[qq.correct]}</span></>}
                    </p>
                    <p className="text-xs text-slate-500">{qq.explain}</p>
                  </div>
                );
              })}
            </div>

            <button onClick={restart}
              className="px-6 py-3 rounded-xl font-semibold text-sm"
              style={{background:'rgba(0,120,212,0.25)', border:'1px solid rgba(0,120,212,0.5)', color:'#60a5fa'}}>
              🔄 Опитай отново
            </button>
          </section>
        );
      }

      return (
        <section className="fade-in">
          <div className="flex items-center gap-3 mb-2">
            <div className="pulse-dot" style={{background:'#f59e0b'}}/>
            <h2 className="text-xl font-bold text-white">Куиз</h2>
            <span className="badge badge-amber ml-auto">{current+1} / {QUIZ_QUESTIONS.length}</span>
          </div>

          <div className="progress-track mb-5">
            <div className="progress-fill" style={{width:`${progress}%`}}/>
          </div>

          <div key={current} className="glass rounded-2xl p-6 mb-4">
            <p className="text-xs text-slate-500 mb-2 uppercase tracking-widest">Въпрос {current+1}</p>
            <p className="text-base md:text-lg font-semibold text-white mb-5">{q.q}</p>

            <div className="space-y-2">
              {q.opts.map((opt, idx) => {
                let cls = 'quiz-btn rounded-xl px-4 py-3 text-sm text-left w-full';
                if (answered) {
                  if (idx === q.correct) cls += ' correct';
                  else if (idx === chosen) cls += ' wrong';
                  else cls += ' answered opacity-50';
                }
                return (
                  <button key={idx} className={cls} onClick={() => pick(idx)}
                    style={{background: (!answered) ? 'rgba(255,255,255,0.03)' : undefined, color: (!answered) ? '#cbd5e1' : undefined}}>
                    <span className="text-slate-500 mr-2">{['A','B','C','D'][idx]}.</span>
                    {opt}
                  </button>
                );
              })}
            </div>

            {answered && (
              <div className="mt-4 p-3 rounded-xl fade-in" style={{background:'rgba(0,212,170,0.08)', border:'1px solid rgba(0,212,170,0.2)'}}>
                <p className="text-emerald-400 text-xs font-semibold mb-1">💡 Обяснение</p>
                <p className="text-slate-300 text-xs leading-relaxed">{q.explain}</p>
              </div>
            )}
          </div>

          <div className="flex justify-between items-center">
            <button onClick={() => setCurrent(c => Math.max(0, c-1))} disabled={current === 0}
              className="px-4 py-2 rounded-xl text-sm disabled:opacity-30"
              style={{background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', color:'#94a3b8'}}>
              ← Назад
            </button>
            <button onClick={next}
              disabled={!answered}
              className="px-5 py-2.5 rounded-xl font-semibold text-sm disabled:opacity-30 transition-all"
              style={{background: answered ? 'rgba(0,120,212,0.3)' : 'rgba(255,255,255,0.04)', border:'1px solid rgba(0,120,212,0.5)', color: answered ? '#60a5fa' : '#475569'}}>
              {current === QUIZ_QUESTIONS.length - 1 ? '🏁 Завърши' : 'Следващ →'}
            </button>
          </div>
        </section>
      );
    }

    /* ═══════════════════════════════ Glossary ════════════════════════════ */
    function Glossary() {
      const [open, setOpen] = useState(null);
      return (
        <section className="fade-in">
          <div className="flex items-center gap-3 mb-2">
            <div className="pulse-dot" style={{background:'#c084fc'}}/>
            <h2 className="text-xl font-bold text-white">Речник на програмиста</h2>
            <span className="badge badge-purple ml-auto">Ключови термини</span>
          </div>
          <p className="text-slate-400 text-sm mb-5">Кликни върху термин за повече информация и интересен факт.</p>
          <div className="space-y-3">
            {GLOSSARY.map((g, i) => (
              <div key={i} className="glossary-card glass rounded-xl overflow-hidden"
                style={{borderColor: open===i ? g.border : undefined}}
              >
                <button className="w-full flex items-center gap-4 p-4 text-left"
                  onClick={() => setOpen(open===i ? null : i)}>
                  <div className="icon-circle flex-shrink-0" style={{background: g.color, border:`1px solid ${g.border}`}}>
                    📖
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-0.5">
                      <span className="font-bold text-white">{g.term}</span>
                      <span className={`badge ${g.badge}`}>{g.full}</span>
                    </div>
                    <p className="text-slate-500 text-xs truncate">{g.def.slice(0,80)}…</p>
                  </div>
                  <span className="text-slate-500 transition-transform" style={{transform: open===i ? 'rotate(180deg)' : 'none'}}>▾</span>
                </button>

                {open === i && (
                  <div className="px-4 pb-4 fade-in" style={{borderTop:'1px solid rgba(255,255,255,0.06)'}}>
                    <p className="text-slate-300 text-sm leading-relaxed mt-3 mb-3">{g.def}</p>
                    <div className="rounded-xl p-3" style={{background:`${g.color}`, border:`1px solid ${g.border}`}}>
                      <p className="text-xs font-semibold text-yellow-400 mb-1">⭐ Интересен факт</p>
                      <p className="text-slate-300 text-xs leading-relaxed">{g.fact}</p>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </section>
      );
    }

    /* ═══════════════════════════════ Slides Section ════════════════════════ */
    function SlidesSection() {
      const [idx, setIdx] = useState(0);
      const [key, setKey] = useState(0);

      const goTo = (i) => {
        setIdx(i);
        setKey(k => k+1);
      };
      const prev = () => { if (idx > 0) goTo(idx-1); };
      const next = () => { if (idx < SLIDES.length-1) goTo(idx+1); };

      const slide = SLIDES[idx];
      const Body = slide.body;

      return (
        <section className="fade-in">
          <div className="flex items-center gap-3 mb-5">
            <div className="pulse-dot"/>
            <h2 className="text-xl font-bold text-white">Теория</h2>
            <span className="badge badge-blue ml-auto">{idx+1}/{SLIDES.length}</span>
          </div>

          {/* Slide dots */}
          <div className="flex gap-2 mb-4 flex-wrap">
            {SLIDES.map((s, i) => (
              <button key={i} onClick={() => goTo(i)}
                className={`nav-tab rounded-lg ${i===idx ? 'active' : ''}`}>
                {s.icon} {s.title}
              </button>
            ))}
          </div>

          {/* Progress */}
          <div className="progress-track mb-5">
            <div className="progress-fill" style={{width:`${((idx+1)/SLIDES.length)*100}%`}}/>
          </div>

          {/* Slide card */}
          <div className="glass rounded-2xl p-5 md:p-7 mb-5 slide-enter" key={key}>
            <div className="flex items-center gap-3 mb-4 pb-4" style={{borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
              <span className="text-3xl">{slide.icon}</span>
              <div>
                <div className="flex items-center gap-2">
                  <span className={`badge ${slide.badgeClass}`}>{slide.badge}</span>
                </div>
                <h3 className="text-lg md:text-xl font-bold text-white mt-1">{slide.title}</h3>
                <p className="text-slate-400 text-xs">{slide.subtitle}</p>
              </div>
            </div>
            <Body/>
          </div>

          {/* Navigation */}
          <div className="flex justify-between">
            <button onClick={prev} disabled={idx===0}
              className="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold disabled:opacity-30 transition-all"
              style={{background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', color:'#94a3b8'}}>
              ← Назад
            </button>
            <button onClick={next} disabled={idx===SLIDES.length-1}
              className="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold disabled:opacity-30 transition-all"
              style={{background:'rgba(0,120,212,0.2)', border:'1px solid rgba(0,120,212,0.45)', color:'#60a5fa'}}>
              Напред →
            </button>
          </div>
        </section>
      );
    }

    /* ═══════════════════════════════ Main App ═════════════════════════════ */
    const TABS = [
      { id: 'theory',   label: '📚 Теория',      component: SlidesSection },
      { id: 'demo',     label: '💻 Демонстрация', component: CodeDemo },
      { id: 'game',     label: '🎮 Mapper Matcher', component: MapperGame },
      { id: 'quiz',     label: '🧠 Куиз',         component: Quiz },
      { id: 'glossary', label: '📖 Речник',        component: Glossary },
    ];

    function App() {
      const [tab, setTab] = useState('theory');
      const ActiveComp = TABS.find(t => t.id === tab)?.component;

      return (
        <div className="min-h-screen flex flex-col">
          {/* Header */}
          <header className="glass sticky top-0 z-50" style={{borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
            <div className="max-w-5xl mx-auto px-4">
              {/* Top bar */}
              <div className="flex items-center gap-3 py-3" style={{borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
                <div className="flex items-center gap-2">
                  <div style={{width:28, height:28, background:'linear-gradient(135deg,#0078d4,#9b59d0)', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'0.85rem'}}>⚙</div>
                  <div>
                    <p className="font-bold text-white text-sm leading-tight">Обектно-ориентиран модел на РБД</p>
                    <p className="text-slate-500 text-xs">ORM & Entity Framework · 12. клас · Информатика</p>
                  </div>
                </div>
                <div className="ml-auto flex items-center gap-2">
                  <span className="badge badge-blue hidden sm:inline-flex">Урок 5</span>
                  <span className="badge badge-green hidden sm:inline-flex">Модул 4</span>
                </div>
              </div>
              {/* Nav tabs */}
              <div className="flex overflow-x-auto" style={{scrollbarWidth:'none'}}>
                {TABS.map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)}
                    className={`nav-tab ${tab===t.id ? 'active' : ''}`}>
                    {t.label}
                  </button>
                ))}
              </div>
            </div>
          </header>

          {/* Hero */}
          {tab === 'theory' && (
            <div className="py-10 text-center px-4 fade-in"
              style={{background:'linear-gradient(180deg, rgba(0,120,212,0.08) 0%, transparent 100%)'}}>
              <div className="flex items-center justify-center gap-3 mb-3">
                <div className="h-px flex-1 max-w-24" style={{background:'linear-gradient(90deg,transparent,rgba(0,120,212,0.5))'}}/>
                <span className="text-3xl">🔗</span>
                <div className="h-px flex-1 max-w-24" style={{background:'linear-gradient(90deg,rgba(155,89,208,0.5),transparent)'}}/>
              </div>
              <h1 className="text-2xl md:text-4xl font-black text-white mb-2">
                ORM &amp; <span style={{background:'linear-gradient(90deg,#0078d4,#9b59d0)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent'}}>Entity Framework</span>
              </h1>
              <p className="text-slate-400 text-sm max-w-lg mx-auto">
                Обектно-ориентиран модел на релационна база от данни — от таблици към класове
              </p>
            </div>
          )}

          {/* Main content */}
          <main className="flex-1 max-w-5xl mx-auto w-full px-4 pb-12 pt-2">
            {ActiveComp && <ActiveComp key={tab}/>}
          </main>

          {/* Footer */}
          <footer className="text-center py-4 text-slate-600 text-xs"
            style={{borderTop:'1px solid rgba(255,255,255,0.05)'}}>
            Информатика · 12. клас · ООМ на Релационна База от Данни · Урок 5, Модул 4
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
