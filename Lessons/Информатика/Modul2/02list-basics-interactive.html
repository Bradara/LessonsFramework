<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C# Списъци (List Basics) - Интерактивен Урок</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .hero-bg {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.8) 0%, rgba(30, 41, 59, 0.8) 100%),
                        url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=1200&h=600&fit=crop') center/cover;
            position: relative;
            overflow: hidden;
        }

        .glassmorphism {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
        }

        .slide-enter {
            animation: slideEnter 0.5s ease-out;
        }

        @keyframes slideEnter {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .list-item-enter {
            animation: listItemEnter 0.3s ease-out;
        }

        @keyframes listItemEnter {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hover-glow:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        .code-block {
            background: rgba(15, 23, 42, 0.8);
            border-left: 3px solid #3b82f6;
            overflow-x: auto;
        }

        .progress-bar {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            height: 4px;
            border-radius: 2px;
        }

        .quiz-card {
            transition: all 0.3s ease;
        }

        .quiz-card:hover {
            transform: translateY(-2px);
        }

        .correct-answer {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
        }

        .incorrect-answer {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .bounce {
            animation: bounce 0.6s ease-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Main App Component
        function App() {
            const [currentSection, setCurrentSection] = useState('hero');
            const [currentSlide, setCurrentSlide] = useState(0);

            useEffect(() => {
                lucide.createIcons();
            }, [currentSection, currentSlide]);

            const sections = ['hero', 'slides', 'demo', 'game', 'quiz', 'summary'];

            const goToSection = (section) => {
                setCurrentSection(section);
                setCurrentSlide(0);
                window.scrollTo(0, 0);
            };

            return (
                <div className="min-h-screen bg-slate-900">
                    {/* Navigation */}
                    <nav className="fixed top-0 left-0 right-0 z-50 glassmorphism m-2 md:m-4 rounded-lg">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2">
                            <h1 className="text-lg md:text-xl font-bold text-blue-400 flex items-center gap-2">
                                <i data-lucide="code" className="w-5 h-5"></i>
                                C# Списъци
                            </h1>
                            <div className="flex gap-2 flex-wrap justify-end">
                                {sections.map((section) => (
                                    <button
                                        key={section}
                                        onClick={() => goToSection(section)}
                                        className={`px-3 py-1 text-xs md:text-sm rounded-lg transition ${
                                            currentSection === section
                                                ? 'bg-blue-500 text-white'
                                                : 'bg-slate-700 text-slate-200 hover:bg-slate-600'
                                        }`}
                                    >
                                        {section === 'hero' && 'Начало'}
                                        {section === 'slides' && 'Слайдове'}
                                        {section === 'demo' && 'Лаб'}
                                        {section === 'game' && 'Игра'}
                                        {section === 'quiz' && 'Тест'}
                                        {section === 'summary' && 'Резюме'}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <div className="pt-16">
                        {currentSection === 'hero' && <HeroSection goToSection={goToSection} />}
                        {currentSection === 'slides' && <SlidesSection />}
                        {currentSection === 'demo' && <DemoSection />}
                        {currentSection === 'game' && <GameSection />}
                        {currentSection === 'quiz' && <QuizSection />}
                        {currentSection === 'summary' && <SummarySection />}
                    </div>
                </div>
            );
        }

        // Hero Section
        function HeroSection({ goToSection }) {
            return (
                <div className="hero-bg h-screen flex items-center justify-center relative overflow-hidden">
                    <div className="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-slate-900"></div>
                    
                    <div className="relative z-10 text-center px-4 max-w-3xl mx-auto">
                        <div className="mb-6 inline-block">
                            <div className="w-16 h-16 md:w-20 md:h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i data-lucide="list" className="w-8 h-8 md:w-10 md:h-10 text-white"></i>
                            </div>
                        </div>
                        
                        <h1 className="text-4xl md:text-6xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                            С#: Основи на Списъците
                        </h1>
                        
                        <p className="text-lg md:text-xl text-slate-300 mb-8">
                            Открий силата на динамичните структури от данни и научи как List&lt;T&gt; трансформира начина, по който работиш с колекции.
                        </p>

                        <div className="flex flex-col md:flex-row gap-4 justify-center">
                            <button
                                onClick={() => goToSection('slides')}
                                className="px-8 py-3 bg-gradient-to-r from-blue-500 to-blue-600 rounded-lg font-semibold hover:shadow-lg hover:shadow-blue-500/50 transition transform hover:-translate-y-1"
                            >
                                Започни Урока
                            </button>
                            <button
                                onClick={() => goToSection('demo')}
                                className="px-8 py-3 border border-blue-400 text-blue-400 rounded-lg font-semibold hover:bg-blue-400/10 transition"
                            >
                                Отиди в Лаб
                            </button>
                        </div>

                        <div className="mt-12 grid grid-cols-3 gap-4 md:gap-8 text-center">
                            <div className="glassmorphism p-4 rounded-lg">
                                <p className="text-2xl md:text-3xl font-bold text-blue-400">7</p>
                                <p className="text-xs md:text-sm text-slate-400">Основни Методи</p>
                            </div>
                            <div className="glassmorphism p-4 rounded-lg">
                                <p className="text-2xl md:text-3xl font-bold text-purple-400">3</p>
                                <p className="text-xs md:text-sm text-slate-400">Интерактивни Слайдове</p>
                            </div>
                            <div className="glassmorphism p-4 rounded-lg">
                                <p className="text-2xl md:text-3xl font-bold text-pink-400">10</p>
                                <p className="text-xs md:text-sm text-slate-400">Въпроса в Теста</p>
                            </div>
                        </div>
                    </div>

                    <div className="absolute bottom-8 left-1/2 transform -translate-x-1/2 animate-bounce">
                        <i data-lucide="chevron-down" className="w-6 h-6 text-slate-400"></i>
                    </div>
                </div>
            );
        }

        // Slides Section
        function SlidesSection() {
            const [currentSlide, setCurrentSlide] = useState(0);

            const slides = [
                {
                    title: "Какво е List?",
                    content: (
                        <div className="space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="glassmorphism p-6 rounded-lg">
                                    <h3 className="font-bold text-blue-400 mb-3 flex items-center gap-2">
                                        <i data-lucide="list" className="w-5 h-5"></i>
                                        List&lt;T&gt;
                                    </h3>
                                    <ul className="space-y-2 text-sm text-slate-300">
                                        <li>✓ Динамична дължина</li>
                                        <li>✓ Един тип данни</li>
                                        <li>✓ Лако добавяне/премахване</li>
                                        <li>✓ Индексирани елементи</li>
                                    </ul>
                                </div>
                                <div className="glassmorphism p-6 rounded-lg">
                                    <h3 className="font-bold text-purple-400 mb-3 flex items-center gap-2">
                                        <i data-lucide="square" className="w-5 h-5"></i>
                                        Масив (Array)
                                    </h3>
                                    <ul className="space-y-2 text-sm text-slate-300">
                                        <li>✗ Фиксирана дължина</li>
                                        <li>✓ Един тип данни</li>
                                        <li>✗ Сложно добавяне/премахване</li>
                                        <li>✓ Индексирани елементи</li>
                                    </ul>
                                </div>
                            </div>

                            <div className="code-block p-4 rounded-lg">
                                <pre className="text-xs md:text-sm font-mono text-slate-200">
<span className="text-green-400">// Инициализация</span>
List&lt;string&gt; names = <span className="text-blue-400">new</span> List&lt;string&gt;();
List&lt;int&gt; numbers = <span className="text-blue-400">new</span> List&lt;int&gt;() {'{'}{'{'} 1, 2, 3 {'}'}{'}'};
List&lt;double&gt; prices = <span className="text-blue-400">new</span> List&lt;double&gt;();
                                </pre>
                            </div>

                            <div className="bg-blue-900/30 border-l-4 border-blue-500 p-4 rounded">
                                <p className="text-sm text-slate-300">
                                    💡 <strong>Съвет:</strong> Използвай List&lt;T&gt; когато не знаеш колко елемента ще имаш. За известна дължина масивите са по-бързи!
                                </p>
                            </div>
                        </div>
                    )
                },
                {
                    title: "Операции с List",
                    content: (
                        <div className="space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <MethodCard
                                    name="Add(элемент)"
                                    description="Добавя елемент в края"
                                    code="list.Add(10);"
                                    color="blue"
                                />
                                <MethodCard
                                    name="Remove(елемент)"
                                    description="Премахва първия с тази стойност"
                                    code="list.Remove(10);"
                                    color="red"
                                />
                                <MethodCard
                                    name="Insert(индекс, елемент)"
                                    description="Вмъква на позиция"
                                    code="list.Insert(0, 5);"
                                    color="purple"
                                />
                                <MethodCard
                                    name="RemoveAt(индекс)"
                                    description="Премахва от позиция"
                                    code="list.RemoveAt(0);"
                                    color="orange"
                                />
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <MethodCard
                                    name="Count"
                                    description="Брой елементи"
                                    code="int n = list.Count;"
                                    color="green"
                                />
                                <MethodCard
                                    name="Contains(елемент)"
                                    description="Проверя наличност"
                                    code="bool exists = list.Contains(10);"
                                    color="yellow"
                                />
                                <MethodCard
                                    name="Sort()"
                                    description="Сортира възходящо"
                                    code="list.Sort();"
                                    color="cyan"
                                />
                            </div>
                        </div>
                    )
                },
                {
                    title: "Вход и Изход",
                    content: (
                        <div className="space-y-6">
                            <div className="glassmorphism p-6 rounded-lg">
                                <h3 className="font-bold text-blue-400 mb-3 flex items-center gap-2">
                                    <i data-lucide="arrow-down" className="w-5 h-5"></i>
                                    Четене на Данни
                                </h3>
                                <div className="code-block p-4 rounded mb-3">
                                    <pre className="text-xs md:text-sm font-mono text-slate-200">
<span className="text-green-400">// От конзола</span>
string input = Console.ReadLine();
List&lt;int&gt; numbers = input.Split(' ')
                          .Select(int.Parse)
                          .ToList();
                                    </pre>
                                </div>
                                <p className="text-xs md:text-sm text-slate-400">Пример: Вход: "1 2 3 4 5"</p>
                            </div>

                            <div className="glassmorphism p-6 rounded-lg">
                                <h3 className="font-bold text-purple-400 mb-3 flex items-center gap-2">
                                    <i data-lucide="arrow-up" className="w-5 h-5"></i>
                                    Отпечатване на Данни
                                </h3>
                                <div className="code-block p-4 rounded mb-3">
                                    <pre className="text-xs md:text-sm font-mono text-slate-200">
<span className="text-green-400">// В конзола</span>
string result = string.Join(", ", list);
Console.WriteLine(result);

<span className="text-green-400">// Или с цикъл</span>
<span className="text-blue-400">foreach</span> (var item <span className="text-blue-400">in</span> list)
    Console.WriteLine(item);
                                    </pre>
                                </div>
                                <p className="text-xs md:text-sm text-slate-400">Резултат: "1, 2, 3, 4, 5"</p>
                            </div>

                            <div className="bg-purple-900/30 border-l-4 border-purple-500 p-4 rounded">
                                <p className="text-sm text-slate-300">
                                    💡 <strong>Фокус:</strong> string.Join() е идеален за форматиране на списъци, а Split() за разбиране!
                                </p>
                            </div>
                        </div>
                    )
                }
            ];

            const nextSlide = () => {
                setCurrentSlide((prev) => (prev + 1) % slides.length);
            };

            const prevSlide = () => {
                setCurrentSlide((prev) => (prev - 1 + slides.length) % slides.length);
            };

            return (
                <div className="min-h-screen py-20 px-4">
                    <div className="max-w-4xl mx-auto">
                        {/* Progress Bar */}
                        <div className="mb-8 flex items-center justify-between">
                            <p className="text-slate-400">Слайд {currentSlide + 1} / {slides.length}</p>
                            <div className="flex-1 mx-4 h-2 bg-slate-700 rounded-full overflow-hidden">
                                <div
                                    className="progress-bar transition-all duration-300"
                                    style={{ width: `${((currentSlide + 1) / slides.length) * 100}%` }}
                                ></div>
                            </div>
                        </div>

                        {/* Slide Content */}
                        <div className="slide-enter glassmorphism p-8 rounded-lg mb-8">
                            <h2 className="text-3xl md:text-4xl font-bold text-blue-400 mb-8">
                                {slides[currentSlide].title}
                            </h2>
                            <div className="text-slate-300 fade-in">
                                {slides[currentSlide].content}
                            </div>
                        </div>

                        {/* Navigation */}
                        <div className="flex items-center justify-center gap-4">
                            <button
                                onClick={prevSlide}
                                disabled={currentSlide === 0}
                                className="p-3 bg-slate-700 hover:bg-slate-600 disabled:opacity-50 rounded-lg transition"
                            >
                                <i data-lucide="chevron-left" className="w-5 h-5"></i>
                            </button>

                            <div className="flex gap-2">
                                {slides.map((_, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => setCurrentSlide(idx)}
                                        className={`w-3 h-3 rounded-full transition ${
                                            idx === currentSlide ? 'bg-blue-500' : 'bg-slate-600'
                                        }`}
                                    ></button>
                                ))}
                            </div>

                            <button
                                onClick={nextSlide}
                                disabled={currentSlide === slides.length - 1}
                                className="p-3 bg-slate-700 hover:bg-slate-600 disabled:opacity-50 rounded-lg transition"
                            >
                                <i data-lucide="chevron-right" className="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Method Card Component
        function MethodCard({ name, description, code, color }) {
            const colorClasses = {
                blue: 'border-blue-500 text-blue-400',
                red: 'border-red-500 text-red-400',
                purple: 'border-purple-500 text-purple-400',
                orange: 'border-orange-500 text-orange-400',
                green: 'border-green-500 text-green-400',
                yellow: 'border-yellow-500 text-yellow-400',
                cyan: 'border-cyan-500 text-cyan-400'
            };

            return (
                <div className={`glassmorphism p-4 rounded-lg border-l-4 ${colorClasses[color]}`}>
                    <h4 className="font-bold mb-1">{name}</h4>
                    <p className="text-xs text-slate-400 mb-2">{description}</p>
                    <code className="text-xs bg-slate-800 p-2 rounded block">{code}</code>
                </div>
            );
        }

        // Demo Section - List Lab
        function DemoSection() {
            const [list, setList] = useState([10, 20, 30]);
            const [inputValue, setInputValue] = useState('');
            const [insertIndex, setInsertIndex] = useState('');

            const addElement = () => {
                if (inputValue.trim()) {
                    const num = parseInt(inputValue);
                    if (!isNaN(num)) {
                        setList([...list, num]);
                        setInputValue('');
                    }
                }
            };

            const removeElement = (idx) => {
                setList(list.filter((_, i) => i !== idx));
            };

            const insertElement = () => {
                const idx = parseInt(insertIndex);
                const num = parseInt(inputValue);
                if (!isNaN(idx) && !isNaN(num) && idx >= 0 && idx <= list.length) {
                    const newList = [...list];
                    newList.splice(idx, 0, num);
                    setList(newList);
                    setInputValue('');
                    setInsertIndex('');
                }
            };

            const sortAscending = () => {
                setList([...list].sort((a, b) => a - b));
            };

            const sortDescending = () => {
                setList([...list].sort((a, b) => b - a));
            };

            const clearList = () => {
                setList([]);
            };

            return (
                <div className="min-h-screen py-20 px-4">
                    <div className="max-w-5xl mx-auto">
                        <h2 className="text-4xl font-bold text-blue-400 mb-4 flex items-center gap-2">
                            <i data-lucide="beaker" className="w-8 h-8"></i>
                            List Lab - Интерактивен Симулатор
                        </h2>
                        <p className="text-slate-300 mb-8">Експериментирай с операции на списъци в реално време!</p>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* Controls */}
                            <div className="lg:col-span-2">
                                <div className="glassmorphism p-6 rounded-lg space-y-6">
                                    {/* Add Element */}
                                    <div className="border-b border-slate-700 pb-6">
                                        <h3 className="font-bold text-green-400 mb-3 flex items-center gap-2">
                                            <i data-lucide="plus" className="w-5 h-5"></i>
                                            Добави Елемент
                                        </h3>
                                        <div className="flex gap-2">
                                            <input
                                                type="number"
                                                value={inputValue}
                                                onChange={(e) => setInputValue(e.target.value)}
                                                placeholder="Число..."
                                                className="flex-1 px-3 py-2 bg-slate-800 border border-slate-600 rounded text-white text-sm"
                                                onKeyPress={(e) => e.key === 'Enter' && addElement()}
                                            />
                                            <button
                                                onClick={addElement}
                                                className="px-4 py-2 bg-green-600 hover:bg-green-700 rounded text-sm font-semibold transition"
                                            >
                                                Добави
                                            </button>
                                        </div>
                                    </div>

                                    {/* Insert at Index */}
                                    <div className="border-b border-slate-700 pb-6">
                                        <h3 className="font-bold text-purple-400 mb-3 flex items-center gap-2">
                                            <i data-lucide="arrow-right" className="w-5 h-5"></i>
                                            Вмъкни на Позиция
                                        </h3>
                                        <div className="flex gap-2">
                                            <input
                                                type="number"
                                                value={insertIndex}
                                                onChange={(e) => setInsertIndex(e.target.value)}
                                                placeholder="Индекс..."
                                                className="w-24 px-3 py-2 bg-slate-800 border border-slate-600 rounded text-white text-sm"
                                            />
                                            <input
                                                type="number"
                                                value={inputValue}
                                                onChange={(e) => setInputValue(e.target.value)}
                                                placeholder="Число..."
                                                className="flex-1 px-3 py-2 bg-slate-800 border border-slate-600 rounded text-white text-sm"
                                                onKeyPress={(e) => e.key === 'Enter' && insertElement()}
                                            />
                                            <button
                                                onClick={insertElement}
                                                className="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded text-sm font-semibold transition"
                                            >
                                                Вмъкни
                                            </button>
                                        </div>
                                    </div>

                                    {/* Sorting */}
                                    <div className="border-b border-slate-700 pb-6">
                                        <h3 className="font-bold text-cyan-400 mb-3 flex items-center gap-2">
                                            <i data-lucide="arrow-up-down" className="w-5 h-5"></i>
                                            Сортиране
                                        </h3>
                                        <div className="flex gap-2">
                                            <button
                                                onClick={sortAscending}
                                                className="flex-1 px-4 py-2 bg-cyan-600 hover:bg-cyan-700 rounded text-sm font-semibold transition"
                                            >
                                                Възходящ
                                            </button>
                                            <button
                                                onClick={sortDescending}
                                                className="flex-1 px-4 py-2 bg-cyan-600 hover:bg-cyan-700 rounded text-sm font-semibold transition"
                                            >
                                                Низходящ
                                            </button>
                                        </div>
                                    </div>

                                    {/* Clear */}
                                    <button
                                        onClick={clearList}
                                        className="w-full px-4 py-2 bg-red-600 hover:bg-red-700 rounded text-sm font-semibold transition"
                                    >
                                        <i data-lucide="trash-2" className="w-4 h-4 inline mr-2"></i>
                                        Изчисти Списъка
                                    </button>
                                </div>
                            </div>

                            {/* Display List */}
                            <div className="glassmorphism p-6 rounded-lg">
                                <h3 className="font-bold text-slate-300 mb-4">Текущ Списък</h3>
                                <div className="space-y-2 mb-4">
                                    {list.length === 0 ? (
                                        <p className="text-slate-500 text-center py-8">Списъкът е празен</p>
                                    ) : (
                                        list.map((item, idx) => (
                                            <div
                                                key={idx}
                                                className="list-item-enter flex items-center justify-between bg-slate-800 p-3 rounded"
                                            >
                                                <div className="flex items-center gap-3 flex-1">
                                                    <span className="text-slate-500 text-sm w-6">[{idx}]:</span>
                                                    <span className="text-blue-400 font-mono font-bold">{item}</span>
                                                </div>
                                                <button
                                                    onClick={() => removeElement(idx)}
                                                    className="p-1 hover:bg-red-600/30 rounded transition"
                                                    title="Премахни"
                                                >
                                                    <i data-lucide="x" className="w-4 h-4 text-red-400"></i>
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                                <div className="pt-4 border-t border-slate-700">
                                    <p className="text-slate-400 text-sm">
                                        <strong>Count:</strong> {list.length}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Game Section - Gauss Challenge
        function GameSection() {
            const [gameList, setGameList] = useState([1, 2, 3, 4, 5]);
            const [selectedPairs, setSelectedPairs] = useState([]);
            const [totalSum, setTotalSum] = useState(0);
            const [gameWon, setGameWon] = useState(false);
            const [message, setMessage] = useState('');

            const correctSum = gameList.reduce((a, b) => a + b, 0);
            const pairsNeeded = Math.ceil(gameList.length / 2);

            const togglePair = (firstIdx, lastIdx) => {
                const pairKey = `${firstIdx}-${lastIdx}`;
                const pairSum = gameList[firstIdx] + gameList[lastIdx];

                if (selectedPairs.includes(pairKey)) {
                    setSelectedPairs(selectedPairs.filter(p => p !== pairKey));
                    setTotalSum(totalSum - pairSum);
                } else {
                    if (selectedPairs.length < pairsNeeded) {
                        const newPairs = [...selectedPairs, pairKey];
                        const newSum = totalSum + pairSum;
                        setSelectedPairs(newPairs);
                        setTotalSum(newSum);
                        setMessage('');

                        if (newSum === correctSum && newPairs.length === pairsNeeded) {
                            setGameWon(true);
                            setMessage('🎉 Отлично! Намери правилния резултат на Гаус!');
                        }
                    } else {
                        setMessage('❌ Вече си избрал достатъчно двойки!');
                    }
                }
            };

            const resetGame = () => {
                setGameList(Array.from({ length: Math.floor(Math.random() * 3) + 4 }, (_, i) => i + 1));
                setSelectedPairs([]);
                setTotalSum(0);
                setGameWon(false);
                setMessage('');
            };

            return (
                <div className="min-h-screen py-20 px-4">
                    <div className="max-w-3xl mx-auto">
                        <h2 className="text-4xl font-bold text-purple-400 mb-4 flex items-center gap-2">
                            <i data-lucide="zap" className="w-8 h-8"></i>
                            Предизвикателството на Гаус
                        </h2>
                        <p className="text-slate-300 mb-8">
                            Намери сумата, като събереш елементите от двата края на списъка (методът на Гаус)!
                        </p>

                        <div className="glassmorphism p-8 rounded-lg space-y-6">
                            {/* Info */}
                            <div className="grid grid-cols-3 gap-4 text-center">
                                <div className="bg-slate-800 p-3 rounded">
                                    <p className="text-slate-400 text-xs">Списък</p>
                                    <p className="text-lg font-bold text-blue-400">{gameList.join(', ')}</p>
                                </div>
                                <div className="bg-slate-800 p-3 rounded">
                                    <p className="text-slate-400 text-xs">Сума на Гаус</p>
                                    <p className="text-lg font-bold text-purple-400">{correctSum}</p>
                                </div>
                                <div className="bg-slate-800 p-3 rounded">
                                    <p className="text-slate-400 text-xs">Твоя Сума</p>
                                    <p className="text-lg font-bold text-cyan-400">{totalSum}</p>
                                </div>
                            </div>

                            {/* Pairs to select */}
                            <div>
                                <p className="text-slate-400 text-sm mb-3">Процес: {selectedPairs.length} / {pairsNeeded} двойки</p>
                                <div className="space-y-2">
                                    {Array.from({ length: pairsNeeded }).map((_, pairIdx) => {
                                        const firstIdx = pairIdx;
                                        const lastIdx = gameList.length - 1 - pairIdx;
                                        const pairKey = `${firstIdx}-${lastIdx}`;
                                        const isSelected = selectedPairs.includes(pairKey);
                                        const pairSum = gameList[firstIdx] + gameList[lastIdx];

                                        return (
                                            <button
                                                key={pairIdx}
                                                onClick={() => togglePair(firstIdx, lastIdx)}
                                                className={`w-full p-4 rounded-lg transition ${
                                                    isSelected
                                                        ? 'bg-purple-600 border-2 border-purple-400 text-white'
                                                        : 'glassmorphism hover-glow text-slate-300'
                                                }`}
                                            >
                                                <span className="font-mono">
                                                    {gameList[firstIdx]} + {gameList[lastIdx]} = {pairSum}
                                                </span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Message */}
                            {message && (
                                <div className={`p-4 rounded-lg ${gameWon ? 'bg-green-900/30 border border-green-500' : 'bg-red-900/30 border border-red-500'}`}>
                                    <p className="text-center text-sm font-semibold">{message}</p>
                                </div>
                            )}

                            {/* Reset Button */}
                            <button
                                onClick={resetGame}
                                className="w-full px-4 py-3 bg-gradient-to-r from-purple-600 to-pink-600 hover:shadow-lg hover:shadow-purple-500/50 rounded-lg font-semibold transition"
                            >
                                {gameWon ? '🎮 Нова Игра' : 'Нова Игра'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Quiz Section
        function QuizSection() {
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [answered, setAnswered] = useState(false);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showResults, setShowResults] = useState(false);

            const questions = [
                {
                    question: "Какво връща методът Count()?",
                    options: [
                        { text: "Брой елементи в списъка", correct: true },
                        { text: "Максималния елемент", correct: false },
                        { text: "Последния елемент", correct: false },
                        { text: "Индекса на елемента", correct: false }
                    ]
                },
                {
                    question: "Как се добавя елемент в края на List?",
                    options: [
                        { text: "list.Insert(0, элемент)", correct: false },
                        { text: "list.Add(елемент)", correct: true },
                        { text: "list.Append(елемент)", correct: false },
                        { text: "list.Push(елемент)", correct: false }
                    ]
                },
                {
                    question: "Какво прави методът Insert()?",
                    options: [
                        { text: "Запълва празни места", correct: false },
                        { text: "Вмъква елемент на конкретна позиция", correct: true },
                        { text: "Премахва елемент", correct: false },
                        { text: "Променя стойност", correct: false }
                    ]
                },
                {
                    question: "Как се разбира string на числа?",
                    options: [
                        { text: "string.Parse()", correct: false },
                        { text: "string.ToList()", correct: false },
                        { text: "string.Split().Select(int.Parse).ToList()", correct: true },
                        { text: "string.Convert()", correct: false }
                    ]
                },
                {
                    question: "Какво е основното предимство на List пред Array?",
                    options: [
                        { text: "По-бърз", correct: false },
                        { text: "Динамична дължина", correct: true },
                        { text: "По-безопасен", correct: false },
                        { text: "Изисква по-малко памет", correct: false }
                    ]
                },
                {
                    question: "Как се сортира list в низходящ порядък?",
                    options: [
                        { text: "list.Sort(); list.Reverse();", correct: true },
                        { text: "list.SortDescending();", correct: false },
                        { text: "list.Descending();", correct: false },
                        { text: "list.ReverseSort();", correct: false }
                    ]
                },
                {
                    question: "Какво прави методът Remove()?",
                    options: [
                        { text: "Премахва на конкретна позиция", correct: false },
                        { text: "Премахва първия с дадена стойност", correct: true },
                        { text: "Премахва последния", correct: false },
                        { text: "Изчиства целия списък", correct: false }
                    ]
                },
                {
                    question: "Как се принтира list с разделител?",
                    options: [
                        { text: "Console.WriteLine(list);", correct: false },
                        { text: "string.Join(', ', list)", correct: true },
                        { text: "list.ToString(', ')", correct: false },
                        { text: "list.Print(', ')", correct: false }
                    ]
                },
                {
                    question: "Какво проверява методът Contains()?",
                    options: [
                        { text: "Дали списъкът е празен", correct: false },
                        { text: "Дали елементът съществува в списъка", correct: true },
                        { text: "Колко елемента има", correct: false },
                        { text: "Позицията на елемента", correct: false }
                    ]
                },
                {
                    question: "Кой е коректния начин за инициализация на List?",
                    options: [
                        { text: "List<int> list = new List<int>();", correct: true },
                        { text: "list<int> list = new list<int>();", correct: false },
                        { text: "List<int> list = [];", correct: false },
                        { text: "Array<int> list = new Array<int>();", correct: false }
                    ]
                }
            ];

            const handleAnswer = (correct) => {
                setSelectedAnswer(correct);
                setAnswered(true);
                if (correct) {
                    setScore(score + 1);
                }
            };

            const nextQuestion = () => {
                if (currentQuestion < questions.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                    setAnswered(false);
                    setSelectedAnswer(null);
                } else {
                    setShowResults(true);
                }
            };

            const restartQuiz = () => {
                setCurrentQuestion(0);
                setScore(0);
                setAnswered(false);
                setSelectedAnswer(null);
                setShowResults(false);
            };

            if (showResults) {
                const percentage = Math.round((score / questions.length) * 100);
                let message = '';
                let color = '';

                if (percentage === 100) {
                    message = '🏆 Перфектно!';
                    color = 'text-yellow-400';
                } else if (percentage >= 80) {
                    message = '⭐ Отлично!';
                    color = 'text-green-400';
                } else if (percentage >= 60) {
                    message = '👍 Добре!';
                    color = 'text-blue-400';
                } else {
                    message = '💪 Попробуй отново!';
                    color = 'text-purple-400';
                }

                return (
                    <div className="min-h-screen py-20 px-4">
                        <div className="max-w-3xl mx-auto">
                            <div className="glassmorphism p-8 rounded-lg text-center space-y-6">
                                <div className="text-6xl">
                                    {percentage === 100 ? '🏆' : percentage >= 80 ? '⭐' : percentage >= 60 ? '👍' : '💪'}
                                </div>
                                <h2 className={`text-4xl font-bold ${color}`}>{message}</h2>
                                <p className="text-3xl font-bold text-slate-300">
                                    {score} / {questions.length} правилни отговора
                                </p>
                                <div className="w-full bg-slate-700 rounded-full h-4 overflow-hidden">
                                    <div
                                        className="progress-bar h-full transition-all duration-300"
                                        style={{ width: `${percentage}%` }}
                                    ></div>
                                </div>
                                <p className="text-2xl font-bold text-slate-300">{percentage}%</p>

                                <button
                                    onClick={restartQuiz}
                                    className="px-8 py-3 bg-purple-600 hover:bg-purple-700 rounded-lg font-semibold transition"
                                >
                                    Отново Тестът
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const question = questions[currentQuestion];

            return (
                <div className="min-h-screen py-20 px-4">
                    <div className="max-w-3xl mx-auto">
                        {/* Progress */}
                        <div className="mb-8">
                            <p className="text-slate-400 mb-2">Въпрос {currentQuestion + 1} / {questions.length}</p>
                            <div className="w-full bg-slate-700 rounded-full h-2 overflow-hidden">
                                <div
                                    className="progress-bar transition-all duration-300"
                                    style={{ width: `${((currentQuestion + 1) / questions.length) * 100}%` }}
                                ></div>
                            </div>
                        </div>

                        {/* Question */}
                        <div className="glassmorphism p-8 rounded-lg mb-8 slide-enter">
                            <h2 className="text-2xl md:text-3xl font-bold text-slate-300 mb-8">
                                {question.question}
                            </h2>

                            {/* Options */}
                            <div className="space-y-3">
                                {question.options.map((option, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => handleAnswer(option.correct)}
                                        disabled={answered}
                                        className={`quiz-card w-full p-4 text-left rounded-lg transition ${
                                            !answered
                                                ? 'glassmorphism hover:bg-slate-700/50 cursor-pointer'
                                                : option.correct
                                                ? 'correct-answer'
                                                : selectedAnswer === option.correct
                                                ? 'incorrect-answer'
                                                : 'glassmorphism'
                                        } ${answered && option.correct ? 'border-2' : ''}`}
                                    >
                                        <div className="flex items-center justify-between">
                                            <span className="text-slate-200">{option.text}</span>
                                            {answered && option.correct && (
                                                <i data-lucide="check" className="w-5 h-5 text-green-400"></i>
                                            )}
                                            {answered && !option.correct && selectedAnswer === true && (
                                                <i data-lucide="x" className="w-5 h-5 text-red-400"></i>
                                            )}
                                        </div>
                                    </button>
                                ))}
                            </div>

                            {/* Next Button */}
                            {answered && (
                                <button
                                    onClick={nextQuestion}
                                    className="w-full mt-8 px-4 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold transition"
                                >
                                    {currentQuestion < questions.length - 1 ? 'Следващ Въпрос' : 'Виж Резултатите'}
                                </button>
                            )}
                        </div>

                        <div className="text-center text-slate-400">
                            Текущ резултат: <span className="text-blue-400 font-bold">{score}</span> правилни
                        </div>
                    </div>
                </div>
            );
        }

        // Summary Section
        function SummarySection() {
            return (
                <div className="min-h-screen py-20 px-4">
                    <div className="max-w-4xl mx-auto">
                        <h2 className="text-4xl font-bold text-green-400 mb-4 flex items-center gap-2">
                            <i data-lucide="book" className="w-8 h-8"></i>
                            Sheat Sheet - Всичко на един поглед
                        </h2>
                        <audio controls className="mb-8 w-full rounded">
                            <source src="./audio/Dynamic_Array_Anthem.mp3" type="audio/mpeg" />
                            Вашият браузър не поддържа аудио елемента.
                        </audio>

                        {/* Key Definitions */}
                        <div className="mb-8 space-y-4">
                            <h3 className="text-2xl font-bold text-blue-400 mb-4">Ключови Определения</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="glassmorphism p-6 rounded-lg">
                                    <h4 className="font-bold text-cyan-400 mb-2">List&lt;T&gt;</h4>
                                    <p className="text-sm text-slate-300">
                                        Обобщена колекция от елементи с еднакъв тип T, които могат да бъдат добавяни или премахвани динамично.
                                    </p>
                                </div>
                                <div className="glassmorphism p-6 rounded-lg">
                                    <h4 className="font-bold text-cyan-400 mb-2">Count</h4>
                                    <p className="text-sm text-slate-300">
                                        Свойство, което връща брой елементи в списъка. Ажурира се автоматично при добавяне/премахване.
                                    </p>
                                </div>
                                <div className="glassmorphism p-6 rounded-lg">
                                    <h4 className="font-bold text-cyan-400 mb-2">Динамична дължина</h4>
                                    <p className="text-sm text-slate-300">
                                        За разлика от масивите, списъците растат или намаляват по размер автоматично при операции.
                                    </p>
                                </div>
                                <div className="glassmorphism p-6 rounded-lg">
                                    <h4 className="font-bold text-cyan-400 mb-2">Индексация (0-based)</h4>
                                    <p className="text-sm text-slate-300">
                                        Първия елемент е на индекс 0, вторият на 1 и т.н. Последния е на индекс Count-1.
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Core Methods */}
                        <div className="mb-8">
                            <h3 className="text-2xl font-bold text-purple-400 mb-4">Основни Методи</h3>
                            <div className="space-y-3">
                                {[
                                    { method: 'Add(elem)', effect: 'Добавя елемент в края' },
                                    { method: 'Remove(elem)', effect: 'Премахва първия с тази стойност' },
                                    { method: 'RemoveAt(idx)', effect: 'Премахва от позиция idx' },
                                    { method: 'Insert(idx, elem)', effect: 'Вмъква elem на позиция idx' },
                                    { method: 'Contains(elem)', effect: 'Връща true ако elem съществува' },
                                    { method: 'Sort()', effect: 'Сортира в възходящ поредък' },
                                    { method: 'Reverse()', effect: 'Обръща редът на елементите' }
                                ].map((item, idx) => (
                                    <div key={idx} className="glassmorphism p-4 rounded-lg flex items-start gap-4">
                                        <code className="text-purple-400 font-mono font-bold min-w-48">{item.method}</code>
                                        <p className="text-slate-300 text-sm flex-1">{item.effect}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Interesting Facts */}
                        <div>
                            <h3 className="text-2xl font-bold text-pink-400 mb-4">3 Интересни Факта 💡</h3>
                            <div className="space-y-4">
                                <div className="glassmorphism p-6 rounded-lg border-l-4 border-pink-500">
                                    <h4 className="font-bold text-pink-400 mb-2">1. Удвояване на Капацитета</h4>
                                    <p className="text-sm text-slate-300">
                                        Когато списък надвиши капацитета си, вътрешният масив се удвоява (概 от 4 на 8, 8 на 16...). Това е оптимизирано за производителност!
                                    </p>
                                </div>
                                <div className="glassmorphism p-6 rounded-lg border-l-4 border-pink-500">
                                    <h4 className="font-bold text-pink-400 mb-2">2. Remove() е O(n) операция</h4>
                                    <p className="text-sm text-slate-300">
                                        Remove() трябва да намери елемента (до O(n)) и след това да премести всички останали (O(n)). За сравнение, Add() е O(1).
                                    </p>
                                </div>
                                <div className="glassmorphism p-6 rounded-lg border-l-4 border-pink-500">
                                    <h4 className="font-bold text-pink-400 mb-2">3. Генерици в действие</h4>
                                    <p className="text-sm text-slate-300">
                                        List&lt;T&gt; е генерична колекция - едно &lt;T&gt; може да е int, string, custom class... Така избягваме type casting!
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Code Examples */}
                        <div className="mt-8">
                            <h3 className="text-2xl font-bold text-green-400 mb-4">Практични Примери</h3>
                            <div className="code-block p-6 rounded-lg overflow-x-auto">
                                <pre
                                    className="text-xs md:text-sm font-mono text-slate-200"
                                    dangerouslySetInnerHTML={{
                                        __html: `<span class="text-green-400">// Инициализация</span>
List&lt;int&gt; nums = <span class="text-blue-400">new</span> List&lt;int&gt; { 5, 2, 8 };

<span class="text-green-400">// Операции</span>
nums.Add(10);           <span class="text-gray-500">// [5, 2, 8, 10]</span>
nums.Insert(1, 3);      <span class="text-gray-500">// [5, 3, 2, 8, 10]</span>
nums.Remove(2);         <span class="text-gray-500">// [5, 3, 8, 10]</span>
nums.Sort();            <span class="text-gray-500">// [3, 5, 8, 10]</span>

<span class="text-green-400">// I/O</span>
string result = string.Join(<span class="text-yellow-400">", "</span>, nums);
Console.WriteLine(result);  <span class="text-gray-500">// Изход: "3, 5, 8, 10"</span>

<span class="text-green-400">// Четене</span>
string input = <span class="text-yellow-400">"1 2 3"</span>;
List&lt;int&gt; list = input.Split(' ')
                     .Select(int.Parse)
                     .ToList();`
                                    }}
                                />
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Render
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
