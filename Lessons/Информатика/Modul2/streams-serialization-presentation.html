## Стриймове, файлове и директории
### Въведение в работата с данни
*Информатика 11 клас Модул 2*

---

<!-- .slide: data-background-image="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=1920&q=80" data-transition="slide" -->

### 1. Какво е Стриймване (Поток)?

* **Стриймът** е подредена редица от битове
* Позволява последователно четене и писане на данни
* Не е нужно данните да са изцяло заредени в паметта!
* **Приложение:** Четене на големи файлове, мрежова комуникация

---

<!-- .slide: data-background-image="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=1920&q=80" data-transition="convex" -->

### 2. StreamReader и StreamWriter

Използват се за работа с **текстови файлове**

* `StreamReader` – Чете текст от поток
* `StreamWriter` – Записва текст в поток

> **Важно:** Винаги затваряйте потока с `.Close()` или използвайте блок `using`, за да освободите ресурсите!

--

<!-- .slide: data-background-image="https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?w=1920&q=80" data-transition="fade" -->

### Пример: Писане във файл

```csharp
using (StreamWriter writer = new StreamWriter("output.txt"))
{
    writer.WriteLine("Здравей, свят!");
    writer.WriteLine("Това е нов ред.");
} // Потокът се затваря автоматично тук
```

---

<!-- .slide: data-background-image="https://images.unsplash.com/photo-1509228468518-180b4acf4e79?w=1920&q=80" data-transition="concave" style="font-size:0.82em" -->

### 3. Класът File

Предоставя **статични методи** за бърза работа с файлове наведнъж

| Метод | Описание |
|-------|----------|
| `File.ReadAllText(path)` | Чете целия текст |
| `File.WriteAllText(path, text)` | Записва текст (презаписва) |
| `File.Exists(path)` | Проверява дали файлът съществува |

---

<!-- .slide: data-background-image="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1920&q=80" data-transition="zoom" style="font-size:0.78em" -->

### 4. Класът Directory

Предоставя **статични методи** за работа с папки

| Метод | Описание |
|-------|----------|
| `Directory.CreateDirectory(path)` | Създава нова папка |
| `Directory.GetFiles(path)` | Връща списък с файлове |
| `Directory.GetDirectories(path)` | Връща списък с подпапки |
| `Directory.Exists(path)` | Проверява дали папката съществува |

---

<!-- .slide: data-background-image="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=1920&q=80" data-transition="slide" -->

### Обобщение Стриймове, файове и директории

* **Стрийм** = подредена редица от битове
* **StreamReader / StreamWriter** – четене и писане стъпка по стъпка
* **File** – четене/писане наведнъж
* **Directory** – навигация в структурата от папки

---

<!-- .slide: data-background-image="https://images.unsplash.com/photo-1627398242454-45a1a6df9db1?w=1920&q=80" data-transition="zoom" -->

## Изключения и Сериализация
### Как да пазим обекти и да хващаме грешки
*Информатика 11 клас Модул 2*

---

<!-- .slide: data-background-image="https://images.unsplash.com/photo-1542903660-eedba2cda584?w=1920&q=80" data-transition="convex" -->

### 1. Какво е Изключение (Exception)?

Изключението е събитие, което **нарушава нормалния ход** на програмата

* Позволява на програмата да „хване" грешката, вместо да спре
* Ключовата дума `throw` предизвиква грешка изкуствено

**Примери:** Липсващ файл &nbsp;·&nbsp; Деление на нула &nbsp;·&nbsp; Невалиден индекс

--

<!-- .slide: data-background-image="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=1920&q=80" data-transition="fade" -->

### Блокът try-catch

```csharp
try
{
    // Опит за четене на файл, който може да не съществува
    string text = File.ReadAllText("missing_file.txt");
}
catch (FileNotFoundException ex)
{
    // Код, изпълняван при грешка
    Console.WriteLine("Файлът не беше намерен!");
}
```

---

<!-- .slide: data-background-image="https://images.unsplash.com/photo-1544256718-3bcf237f3974?w=1920&q=80" data-transition="slide" -->

### 2. Какво е Сериализация?

> Конвертиране на **обект** в поток от байтове или текст,  
> за да бъде **запазен** или **изпратен по мрежата**

**Десериализация** = обратният процес

```
Обект  ──(Serialize)──►  Файл / Мрежа

Файл / Мрежа  ──(Deserialize)──►  Обект
```

---

<!-- .slide: data-background-image="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=1920&q=80" data-transition="concave" -->

### 3. Видове Сериализация

| Вид | Характеристики |
|-----|----------------|
| **Бинарна** | Много бърза, не се чете от хора |
| **XML** | Използва тагове, стандартизиран формат |
| **JSON** | Лек, лесен за четене, **най-популярен** |

--

<!-- .slide: data-background-image="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=1920&q=80" data-transition="fade" -->

### Пример: Сериализация в JSON

```csharp
using System.Text.Json;

WeatherForecast forecast = new WeatherForecast { TemperatureC = 30 };

// Сериализация: Обект → JSON текст
string jsonString = JsonSerializer.Serialize(forecast);
File.WriteAllText("weather.json", jsonString);

// Резултат във файла: {"TemperatureC":30}
```

---

<!-- .slide: data-background-image="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=1920&q=80" data-transition="zoom" -->

## Обобщение – Част 2

* **Изключения (Exceptions)** ни предпазват от срив → `try-catch`
* **Сериализацията** запазва състоянието на нашите обекти
* **Формати:**
  * Бинарен – бърз
  * XML – тагове
  * **JSON** – модерен и лек ✓
