    function SlideDeck() {
      const [index, setIndex] = useState(0);
      const total = slideData.length;

      const go = (dir) => {
        setIndex((prev) => (prev + dir + total) % total);
      };

      return (
        <div className="relative overflow-hidden rounded-[32px] border border-electric/30 bg-panel/60 shadow-glow">
          <div
            className="flex transition-transform duration-700 ease-in-out"
            style={{ transform: `translateX(-${index * 100}%)` }}
          >
            {slideData.map((slide) => (
              <SlideCard key={slide.id} slide={slide} />
            ))}
          </div>
          <div className="absolute inset-x-0 bottom-4 flex items-center justify-between px-6">
            <button
              onClick={() => go(-1)}
              className="flex items-center gap-2 rounded-full border border-electric/40 bg-night/80 px-4 py-2 text-sm text-electric hover:bg-electric/20"

    function TracePanel({ sample }) {
      const [step, setStep] = useState(0);
      const currentSteps = sample.trace;

      const nextStep = () => {
        setStep((prev) => (prev + 1) % currentSteps.length);
      };

      return (
        <div className="rounded-2xl border border-electric/20 bg-panel/70 p-6">
          <div className="flex items-center justify-between">
            <h3 className="text-lg font-semibold text-electric">{sample.title}</h3>

              <div className="mt-3 space-y-2">

                      key={`${frame.label}-${idx}`}

                        idx === 0 ? "bg-electric/20 text-electric" : "bg-white/5 text-slate-200"

    function RecursionGame() {
      const [choice, setChoice] = useState(null);
      const [result, setResult] = useState(null);
      const maxDepth = 7;
      const startN = 6;
      const options = [
        { label: "n == 0", correct: true },
        { label: "n == 1", correct: false },
        { label: "n < 0", correct: false },
        { label: "n == 2", correct: false }
      ];

      const simulate = (option) => {
        const depth = option.correct ? startN + 1 : startN + 2;
        const safe = depth <= maxDepth;
        setChoice(option.label);
        setResult({ safe, depth, correct: option.correct });
      };

      const stackBars = useMemo(() => {
        const active = result ? result.depth : 0;
        return Array.from({ length: maxDepth }, (_, i) => i < active);
      }, [result]);

      return (
        <div className="rounded-3xl border border-electric/30 bg-panel/70 p-8 shadow-glow">
          <div className="flex items-center gap-3">
            <Gamepad2 className="text-cyber" size={24} />
            <h3 className="text-2xl font-semibold text-white">Игра: Recursion Depth</h3>
          </div>
          <p className="mt-3 text-slate-300">
            Старт: n = {startN}. Избираме базов случай за факториел. Целта е да спрем
            рекурсията преди да се запълни стекът.
          </p>
          <div className="mt-6 grid gap-6 md:grid-cols-[1.2fr_0.8fr]">
            <div className="space-y-3">
              {options.map((option) => (
                <button
                  key={option.label}
                  onClick={() => simulate(option)}
                  className={`w-full rounded-xl border px-4 py-3 text-left transition ${
                    choice === option.label
                      ? "border-cyber bg-cyber/10"
                      : "border-white/10 bg-night/60 hover:border-electric/40"
                  }`}
                >
                  Базов случай: {option.label}
                </button>
              ))}
              {result && (
                <div className="rounded-xl border border-white/10 bg-night/70 p-4">
                  <p className="text-sm text-slate-200">
                    Дълбочина: <span className="text-electric">{result.depth}</span> / {maxDepth}
                  </p>
                  <p className="mt-2 text-sm text-slate-300">
                    {result.correct
                      ? "Правилен базов случай: рекурсията приключва контролирано."
                      : "Неправилен базов случай: риск от препълване или грешен резултат."}
                  </p>
                </div>
              )}
            </div>
            <div className="rounded-2xl border border-white/10 bg-night/70 p-4">
              <p className="text-xs uppercase tracking-widest text-slate-400">Визуален стек</p>
              <div className="mt-4 flex flex-col-reverse gap-2">
                {stackBars.map((active, idx) => (
                  <div
                    key={`stack-${idx}`}
                    className={`h-6 rounded-lg transition ${
                      active ? "bg-cyber/80" : "bg-white/5"
                    }`}
                  ></div>
                ))}
              </div>
              <p className="mt-3 text-xs text-slate-400">Лимитът е около 1MB (примерно).</p>
            </div>
          </div>
        </div>
      );
    }

    function Quiz() {
      const [answers, setAnswers] = useState(Array(quizQuestions.length).fill(null));

      const score = answers.reduce((acc, ans, idx) => {
        return acc + (ans === quizQuestions[idx].answer ? 1 : 0);
      }, 0);

      const rank = ranks
        .slice()
        .reverse()
        .find((r) => score >= r.min)?.label;

      return (
        <div className="rounded-3xl border border-electric/30 bg-panel/70 p-8 shadow-glow">
          <div className="flex items-center gap-3">
            <Sparkles className="text-electric" size={24} />
            <h3 className="text-2xl font-semibold text-white">Куиз: Провери знанията</h3>
          </div>
          <div className="mt-6 space-y-6">
            {quizQuestions.map((item, idx) => (
              <div key={item.q} className="rounded-2xl border border-white/10 bg-night/70 p-5">
                <p className="text-sm text-slate-400">Въпрос {idx + 1}</p>
                <h4 className="mt-2 text-lg text-white">{item.q}</h4>
                <div className="mt-4 grid gap-3 md:grid-cols-2">
                  {item.options.map((option, optIdx) => {
                    const isSelected = answers[idx] === optIdx;
                    const isCorrect = optIdx === item.answer;
                    let stateClass = "border-white/10 bg-night/80";
                    if (isSelected) {
                      stateClass = isCorrect
                        ? "border-electric bg-electric/10"
                        : "border-cyber bg-cyber/10";
                    }
                    return (
                      <button
                        key={option}
                        onClick={() => {
                          const next = [...answers];
                          next[idx] = optIdx;
                          setAnswers(next);
                        }}
                        className={`rounded-xl border px-4 py-3 text-left text-sm transition ${stateClass}`}
                      >
                        {option}
                      </button>
                    );
                  })}
                </div>
                {answers[idx] !== null && (
                  <div className="mt-4 flex items-start gap-3 text-sm text-slate-300">
                    {answers[idx] === item.answer ? (
                      <CheckCircle2 size={18} className="text-electric" />
                    ) : (
                      <XCircle size={18} className="text-cyber" />
                    )}
                    <span>{item.explain}</span>
                  </div>
                )}
              </div>
            ))}
          </div>
          <div className="mt-8 rounded-2xl border border-electric/20 bg-night/70 p-6">
            <p className="text-sm uppercase tracking-widest text-slate-400">Резултат</p>
            <p className="mt-2 text-2xl text-white">{score} / {quizQuestions.length}</p>
            <p className="mt-1 text-lg text-electric">Ранг: {rank}</p>
          </div>
        </div>
      );
    }

    function App() {
      const [activeSection, setActiveSection] = useState("slides");
      const [bgLayers, setBgLayers] = useState([
        { id: 0, url: "", opacity: 1 }
      ]);
      const sectionBackgrounds = {
        slides: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1800&q=80",
        demo: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1800&q=80",
        game: "https://images.unsplash.com/photo-1487058792275-0ad4aaf24ca7?auto=format&fit=crop&w=1800&q=80",
        quiz: "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?auto=format&fit=crop&w=1800&q=80",
        final: "https://images.unsplash.com/photo-1484417894907-623942c8ee29?auto=format&fit=crop&w=1800&q=80"
      };
      const activeBackground = sectionBackgrounds[activeSection];

      useEffect(() => {
        if (!activeBackground) {
          return;
        }
        setBgLayers((prev) => {
          const lastId = prev.length ? prev[prev.length - 1].id : 0;
          const faded = prev.map((layer) => ({ ...layer, opacity: 0 }));
          return [...faded, { id: lastId + 1, url: activeBackground, opacity: 1 }];
        });
        const timeout = setTimeout(() => {
          setBgLayers((prev) => prev.filter((layer) => layer.opacity === 1));
        }, 700);
        return () => clearTimeout(timeout);
      }, [activeBackground]);
      const navItems = [
        { id: "slides", label: "Слайдове", icon: Layers },
        { id: "demo", label: "Демо", icon: Code2 },
        { id: "game", label: "Игра", icon: Gamepad2 },
        { id: "quiz", label: "Куиз", icon: Sparkles },
        { id: "final", label: "Речник", icon: BookOpen }
      ];

      return (
        <div className="min-h-screen">
          <div className="fixed inset-0 -z-10">
            {bgLayers.map((layer) => (
              <div
                key={layer.id}
                className="absolute inset-0 bg-cover bg-center transition-opacity duration-1500"
                style={{ backgroundImage: `url(${layer.url})`, opacity: layer.opacity }}
              ></div>
            ))}
            <div className="absolute inset-0 bg-gradient-to-br from-night/35 via-night/55 to-night/70"></div>
            <div className="absolute inset-0 noise"></div>
          </div>
          <header className="relative overflow-hidden border-b border-electric/20">
            <div className="absolute inset-0 bg-grid opacity-30"></div>
            <div className="absolute inset-0 noise"></div>
            <div className="relative z-10 mx-auto max-w-6xl px-6 py-12">
              <div className="flex flex-col gap-6 md:flex-row md:items-center md:justify-between">
                <div>
                  <p className="text-sm uppercase tracking-[0.35em] text-cyber">C# Recursion</p>
                  <h1 className="mt-3 text-3xl md:text-5xl font-semibold text-white">
                    Рекурсия с C#
                  </h1>
                  <p className="mt-4 max-w-2xl text-slate-300">
                    Учебен маршрут за 11. клас: дефиниции, стек, типове рекурсия, сравнение
                    с итерация и интерактивни упражнения.
                  </p>
                </div>
                <div className="rounded-3xl border border-cyber/40 bg-panel/70 p-5 shadow-ember">
                  <p className="text-xs uppercase tracking-widest text-slate-400">Цел</p>
                  <p className="mt-2 text-lg text-white">Разбиране + практика + игра</p>
                  <div className="mt-4 flex items-center gap-2 text-sm text-slate-300">
                    <Sparkles size={16} className="text-cyber" />
                    Готов за часа
                  </div>
                </div>
              </div>
            </div>
          </header>

          <nav className="sticky top-0 z-20 border-b border-electric/20 bg-night/90 backdrop-blur">
            <div className="mx-auto flex max-w-6xl flex-wrap items-center gap-3 px-6 py-4">
              {navItems.map((item) => {
                const Icon = item.icon || Sparkles;
                const active = activeSection === item.id;
                return (
                  <button
                    key={item.id}
                    onClick={() => setActiveSection(item.id)}
                    className={`inline-flex items-center gap-2 rounded-full border px-4 py-2 text-sm transition ${
                      active
                        ? "border-cyber bg-cyber/20 text-cyber"
                        : "border-white/10 bg-night/70 text-slate-300 hover:border-electric/40"
                    }`}
                  >
                    <Icon size={16} /> {item.label}
                  </button>
                );
              })}
            </div>
          </nav>

          <main className="mx-auto max-w-6xl px-6 py-10">
            <div className="relative rounded-[32px] border border-electric/20 bg-night/75 backdrop-blur">
              <div className="p-6 md:p-10">
                {activeSection === "slides" && (
                  <section id="slides" className="space-y-6">
                    <div className="flex items-center justify-between">
                      <h2 className="text-2xl md:text-3xl font-semibold text-white">Slide-based Learning</h2>
                      <div className="flex items-center gap-2 text-sm text-slate-400">
                        <Layers size={16} /> 6 тематични слайда
                      </div>
                    </div>
                    <SlideDeck />
                  </section>
                )}

                {activeSection === "demo" && (
                  <section id="demo" className="space-y-6">
                    <div className="flex items-center justify-between">
                      <h2 className="text-2xl md:text-3xl font-semibold text-white">Демонстрация: Code Playground</h2>
                      <div className="flex items-center gap-2 text-sm text-slate-400">
                        <Code2 size={16} /> Trace визуализации
                      </div>
                    </div>
                    <div className="grid gap-6">
                      {codeSamples.map((sample) => (
                        <TracePanel key={sample.id} sample={sample} />
                      ))}
                    </div>
                  </section>
                )}

                {activeSection === "game" && (
                  <section id="game">
                    <RecursionGame />
                  </section>
                )}

                {activeSection === "quiz" && (
                  <section id="quiz">
                    <Quiz />
                  </section>
                )}

                {activeSection === "final" && (
                  <section id="final" className="rounded-3xl border border-electric/30 bg-panel/70 p-8 shadow-glow">
                    <div className="flex items-center gap-3">
                      <BookOpen className="text-electric" size={24} />
                      <h3 className="text-2xl font-semibold text-white">Речник и Любопитни факти</h3>
                    </div>
                    <div className="mt-6 grid gap-6 md:grid-cols-2">
                      <div className="rounded-2xl border border-white/10 bg-night/70 p-5">
                        <h4 className="text-lg text-white">Ключови термини</h4>
                        <ul className="mt-4 space-y-3 text-slate-300">
                          <li><span className="text-electric">Базов случай</span> — условие за спиране на рекурсията.</li>
                          <li><span className="text-electric">Стек</span> — памет за активните извиквания.</li>
                          <li><span className="text-electric">Рекурсивно стъпало</span> — всяко по-дълбоко извикване.</li>
                          <li><span className="text-electric">Дъно на рекурсия</span> — моментът на връщане.</li>
                        </ul>
                      </div>
                      <div className="rounded-2xl border border-white/10 bg-night/70 p-5">
                        <h4 className="text-lg text-white">Fun Facts</h4>
                        <p className="mt-4 text-slate-300">
                          Вицът: "За да разбереш рекурсията, трябва първо да разбереш рекурсията" —
                          показва как обяснението използва самата идея за самоповторение.
                        </p>
                        <p className="mt-4 text-slate-300">
                          Фракталите в природата (папрат, снежинки) са пример за рекурсивни структури —
                          един и същ модел се повтаря в различни мащаби.
                        </p>
                      </div>
                    </div>
                  </section>
                )}
              </div>
            </div>
          </main>

          <footer className="border-t border-electric/20 py-8">
            <div className="mx-auto max-w-6xl px-6 text-sm text-slate-400 flex flex-col gap-2 md:flex-row md:justify-between">
              <span>Курс: Структури от данни и алгоритми — Рекурсия</span>
              <span>Лиценз: CC-BY-NC-SA (BG-IT-Edu)</span>
            </div>
          </footer>
        </div>
      );
    }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    };

    // lucide-react loaded from local UMD build
    const loadLucide = () => Promise.resolve(window.LucideReact);

    loadLucide()
      .then((mod) => initApp(mod))
      .catch((err) => {
        console.warn("Lucide icons failed to load, using placeholders.", err);
        initApp({});
      });
  </script>
</body>
</html>
