<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Многомерни масиви - Matrix Master</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind Config for Matrix Theme -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'matrix-black': '#000000',
                        'matrix-dark': '#0d0d0d',
                        'matrix-green': '#00ff41',
                        'matrix-green-dim': '#008f11',
                        'matrix-blue': '#00bfff', // Neon blue accent
                        'matrix-blue-dim': '#005f7f'
                    },
                    fontFamily: {
                        mono: ['Consolas', 'Monaco', 'Courier New', 'monospace'],
                    },
                    animation: {
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        glow: {
                            '0%': { boxShadow: '0 0 5px #00ff41' },
                            '100%': { boxShadow: '0 0 20px #00ff41, 0 0 10px #00ff41' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ff41;
            font-family: 'Consolas', monospace;
            overflow-x: hidden;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0d0d0d;
        }
        ::-webkit-scrollbar-thumb {
            background: #003b00;
            border: 1px solid #00ff41;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00ff41;
        }

        .matrix-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)),
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        
        .neon-border {
            box-shadow: 0 0 5px #00ff41, inset 0 0 5px #00ff41;
            border: 1px solid #00ff41;
        }
        
        .neon-text {
            text-shadow: 0 0 5px #00ff41;
        }

        .neon-border-blue {
            box-shadow: 0 0 5px #00bfff, inset 0 0 5px #00bfff;
            border: 1px solid #00bfff;
        }

        .neon-text-blue {
            text-shadow: 0 0 5px #00bfff;
        }

        /* Scanline effect */
        .scanline {
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: linear-gradient(0deg, rgba(0,0,0,0) 50%, rgba(0, 255, 65, 0.02) 50%), linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="scanline"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons ---
        const GridIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>;
        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const CodeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>;
        const BrainIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20a8.5 8.5 0 1 1 0-17 8.5 8.5 0 0 1 0 17Z"></path><path d="M12 11.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z"></path><path d="M9 14.25a1.75 1.75 0 1 1 0-3.5 1.75 1.75 0 0 1 0 3.5Z"></path><path d="M15 14.25a1.75 1.75 0 1 1 0-3.5 1.75 1.75 0 0 1 0 3.5Z"></path></svg>;
        const GamepadIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>;
        const CheckCircleIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const ChevronRightIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const ChevronLeftIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;

        // --- Data ---
        const slides = [
            {
                title: "1. Какво е двумерен масив?",
                content: (
                    <div className="space-y-4">
                        <p className="text-xl">Двумерният масив (матрица) е таблица от данни, организирана в <span className="text-matrix-blue font-bold">редове</span> и <span className="text-matrix-blue font-bold">стълбове</span>.</p>
                        <div className="flex justify-center p-4">
                            <div className="grid grid-cols-3 gap-2 p-4 border border-matrix-green bg-matrix-dark bg-opacity-50">
                                {[0,1,2,3,4,5,6,7,8].map(i => (
                                    <div key={i} className="w-12 h-12 flex items-center justify-center border border-matrix-green-dim text-matrix-green">
                                        {Math.floor(Math.random()*99)}
                                    </div>
                                ))}
                            </div>
                        </div>
                        <ul className="list-disc pl-6 space-y-2 text-gray-300">
                            <li>Представете си го като Excel таблица или шахматна дъска.</li>
                            <li>В C# се дефинира като <code className="bg-gray-800 px-2 py-1 rounded text-red-500">int[,]</code>.</li>
                            <li>Всички елементи в него са от един и същи тип.</li>
                        </ul>
                    </div>
                )
            },
            {
                title: "2. Индексиране и Декларация",
                content: (
                    <div className="space-y-6">
                        <div className="bg-gray-900 p-4 rounded border-l-4 border-matrix-blue">
                            <h3 className="text-matrix-blue font-bold mb-2">Синтаксис:</h3>
                            <code className="text-lg block mb-2">int[,] matrix = new int[<span className="text-yellow-400">редове</span>, <span className="text-purple-400">стълбове</span>];</code>
                            <code className="text-lg block">matrix[0, 2] = 5;</code>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <h4 className="font-bold underline mb-2">Пример: new int[3, 4]</h4>
                                <ul className="list-disc pl-5 text-sm">
                                    <li>3 реда (индекси 0, 1, 2)</li>
                                    <li>4 стълба (индекси 0, 1, 2, 3)</li>
                                    <li>Общо елементи: 3 * 4 = 12</li>
                                </ul>
                            </div>
                            <div className="flex items-center justify-center border border-dashed border-gray-600 p-2">
                                <div className="text-center">
                                    <span className="block text-xs uppercase tracking-widest mb-1">Row Index (i)</span>
                                    <span className="text-3xl font-bold">0</span>
                                </div>
                                <div className="mx-4 text-2xl">,</div>
                                <div className="text-center">
                                    <span className="block text-xs uppercase tracking-widest mb-1">Col Index (j)</span>
                                    <span className="text-3xl font-bold">0</span>
                                </div>
                            </div>
                        </div>
                        <p className="text-sm bg-red-900/30 p-2 border border-red-500/50">⚠️ Важно: Индексите винаги започват от 0, а не от 1!</p>
                    </div>
                )
            },
            {
                title: "3. Главни и Обратни диагонали",
                content: (
                    <div className="space-y-4">
                        <p>В квадратна матрица (N x N) имаме специални зони:</p>
                        <div className="grid grid-cols-2 gap-8">
                            <div className="bg-gray-900 p-3 border border-matrix-green">
                                <h4 className="text-center font-bold text-matrix-green mb-2">Главен диагонал</h4>
                                <p className="text-center text-sm mb-2">i == j</p>
                                <div className="grid grid-cols-3 gap-1 w-24 mx-auto">
                                    <div className="h-6 bg-matrix-green"></div><div className="h-6 bg-gray-800"></div><div className="h-6 bg-gray-800"></div>
                                    <div className="h-6 bg-gray-800"></div><div className="h-6 bg-matrix-green"></div><div className="h-6 bg-gray-800"></div>
                                    <div className="h-6 bg-gray-800"></div><div className="h-6 bg-gray-800"></div><div className="h-6 bg-matrix-green"></div>
                                </div>
                            </div>
                            <div className="bg-gray-900 p-3 border border-matrix-blue">
                                <h4 className="text-center font-bold text-matrix-blue mb-2">Обратен диагонал</h4>
                                <p className="text-center text-sm mb-2">i + j == N - 1</p>
                                <div className="grid grid-cols-3 gap-1 w-24 mx-auto">
                                    <div className="h-6 bg-gray-800"></div><div className="h-6 bg-gray-800"></div><div className="h-6 bg-matrix-blue"></div>
                                    <div className="h-6 bg-gray-800"></div><div className="h-6 bg-matrix-blue"></div><div className="h-6 bg-gray-800"></div>
                                    <div className="h-6 bg-matrix-blue"></div><div className="h-6 bg-gray-800"></div><div className="h-6 bg-gray-800"></div>
                                </div>
                            </div>
                        </div>
                        <p className="text-sm mt-4">N е размерността на матрицата. За new int[3,3], N=3.</p>
                    </div>
                )
            },
            {
                title: "4. Обхождане (Nested Loops)",
                content: (
                    <div className="space-y-4">
                        <p>За да достъпим всеки елемент, използваме вложени цикли <code className="text-yellow-400">for</code>.</p>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-black p-4 rounded font-mono text-sm border-l-2 border-green-500">
                                <div className="text-gray-500">// Обхождане по редове</div>
                                <div className="text-purple-400">for</div> (int i = 0; i &lt; rows; i++) <br/>
                                {'{'}<br/>
                                &nbsp;&nbsp;<div className="text-purple-400">for</div> (int j = 0; j &lt; cols; j++)<br/>
                                &nbsp;&nbsp;{'{'}<br/>
                                &nbsp;&nbsp;&nbsp;&nbsp;Processing(matrix[i, j]);<br/>
                                &nbsp;&nbsp;{'}'}<br/>
                                {'}'}
                            </div>
                            <div className="text-sm flex flex-col justify-center space-y-2">
                                <p><span className="font-bold text-green-400">Външен цикъл (i):</span> Сменя реда.</p>
                                <p><span className="font-bold text-green-400">Вътрешен цикъл (j):</span> Минава през всички колони на текущия ред.</p>
                                <p className="text-xs text-gray-400 italic">Можем да разменим циклите, за да обходим "по стълбове".</p>
                            </div>
                        </div>
                    </div>
                )
            },
            {
                title: "5. dataGridView vs Array",
                content: (
                    <div className="space-y-6">
                        <p>В C# Windows Forms често ползваме <span className="font-bold text-blue-400">dataGridView</span> за визуализация.</p>
                        <div className="flex border border-gray-700 rounded overflow-hidden">
                            <div className="w-1/2 p-4 bg-gray-900 border-r border-gray-700">
                                <h4 className="text-center text-green-500 font-bold mb-2">C# Array (Код)</h4>
                                <div className="text-center text-2xl font-mono border border-green-500/30 py-2">matrix[<span className="text-white">i</span>, <span className="text-blue-400">j</span>]</div>
                                <p className="text-center text-xs mt-1 text-gray-400">Ред (Row), после Колона (Col)</p>
                            </div>
                            <div className="w-1/2 p-4 bg-gray-800">
                                <h4 className="text-center text-blue-400 font-bold mb-2">Visual Component (Grid)</h4>
                                <div className="text-center text-2xl font-mono border border-blue-400/30 py-2">grid[<span className="text-blue-400">j</span>, <span className="text-white">i</span>]</div>
                                <p className="text-center text-xs mt-1 text-gray-400">Колона (Col), после Ред (Row)</p>
                            </div>
                        </div>
                        <p className="text-sm text-yellow-500 text-center">Внимавайте! При графичните компоненти често първо се указва колоната (j, x), а после реда (i, y).</p>
                    </div>
                )
            }
        ];

        const quizQuestions = [
            { q: "Как се декларира матрица с 3 реда и 5 колони?", a: ["int[3,5] m;", "int m = new int[3,5];", "int[,] m = new int[3,5];"], correct: 2 },
            { q: "Колко елемента има в масив new int[4, 6]?", a: ["10", "24", "12"], correct: 1 },
            { q: "Какъв е индексът на първия елемент?", a: ["[1, 1]", "[0, 0]", "[0, 1]"], correct: 1 },
            { q: "Условието за главен диагонал е:", a: ["i == j", "i + j == n - 1", "i < j"], correct: 0 },
            { q: "Условието за обратен диагонал е:", a: ["i > j", "i == j", "i + j == n - 1"], correct: 2 },
            { q: "Кое условие е за елементите ПОД главния диагонал?", a: ["i < j", "i > j", "i == j"], correct: 1 },
            { q: "Как достъпваме елемент на 2-ри ред и 3-та колона?", a: ["m[1, 2]", "m[2, 3]", "m[3, 2]"], correct: 0 },
            { q: "В C# масивите са:", a: ["Динамични", "С фиксирана дължина", "Списъци"], correct: 1 },
            { q: "Какво означава i в стандартния цикъл за обхождане?", a: ["Индекс на колона", "Индекс на ред", "Стойност"], correct: 1 },
            { q: "Ако matrix[2,3] = 10, кое е вярно?", a: ["Ред 2, Кол 3 е 10", "Ред 3, Кол 4 е 10", "Ред 2 е с дължина 10"], correct: 1 }
        ];

        // --- Components ---

        const LearnSection = () => {
            const [currentSlide, setCurrentSlide] = useState(0);

            return (
                <div className="w-full max-w-4xl mx-auto neon-border p-6 bg-black bg-opacity-80 min-h-[500px] flex flex-col">
                    <div className="flex justify-between items-center mb-6 border-b border-gray-800 pb-2">
                        <h2 className="text-2xl font-bold text-matrix-green">Презентация: {slides[currentSlide].title}</h2>
                        <span className="text-gray-500 font-mono">DEBUG: SLIDE_{currentSlide + 1}/{slides.length}</span>
                    </div>
                    
                    <div className="flex-grow text-lg text-gray-200">
                        {slides[currentSlide].content}
                    </div>

                    <div className="flex justify-between mt-8 pt-4 border-t border-gray-800">
                        <button 
                            disabled={currentSlide === 0}
                            onClick={() => setCurrentSlide(prev => prev - 1)}
                            className="flex items-center gap-2 px-4 py-2 border border-matrix-green text-matrix-green hover:bg-matrix-green hover:text-black disabled:opacity-30 disabled:cursor-not-allowed transition"
                        >
                            <ChevronLeftIcon size={20} /> Предишен
                        </button>
                        <button 
                            disabled={currentSlide === slides.length - 1}
                            onClick={() => setCurrentSlide(prev => prev + 1)}
                            className="flex items-center gap-2 px-4 py-2 border border-matrix-green text-matrix-green hover:bg-matrix-green hover:text-black disabled:opacity-30 disabled:cursor-not-allowed transition"
                        >
                            Следващ <ChevronRightIcon size={20} />
                        </button>
                    </div>
                </div>
            );
        };

        const Visualizer = () => {
            const size = 5;
            const delay = 300;
            const [grid, setGrid] = useState(Array(size).fill().map(() => Array(size).fill(0)));
            const [activeCell, setActiveCell] = useState(null); // {r, c}
            const [isAnimating, setIsAnimating] = useState(false);
            const [loopInfo, setLoopInfo] = useState({ i: '-', j: '-' });
            const animationRef = useRef(null);

            const resetGrid = () => {
                setActiveCell(null);
                setLoopInfo({ i: '-', j: '-' });
                if (animationRef.current) clearTimeout(animationRef.current);
                setIsAnimating(false);
            };

            const animateElements = (coords) => {
                if (isAnimating) return;
                setIsAnimating(true);
                let k = 0;

                const nextStep = () => {
                    if (k < coords.length) {
                        const {r, c} = coords[k];
                        setActiveCell({r, c});
                        setLoopInfo({ i: r, j: c });
                        k++;
                        animationRef.current = setTimeout(nextStep, delay);
                    } else {
                        setIsAnimating(false);
                    }
                };
                nextStep();
            };

            const traverseRows = () => {
                const coords = [];
                for(let r=0; r<size; r++) {
                    for(let c=0; c<size; c++) coords.push({r, c});
                }
                animateElements(coords);
            };

            const traverseCols = () => {
                const coords = [];
                for(let c=0; c<size; c++) {
                    for(let r=0; r<size; r++) coords.push({r, c});
                }
                animateElements(coords);
            };

            const traverseMainDiag = () => {
                const coords = [];
                for(let i=0; i<size; i++) coords.push({r: i, c: i});
                animateElements(coords);
            };

            const traverseBelowMainDiag = () => {
                const coords = [];
                for(let r=0; r<size; r++) {
                    for(let c=0; c<size; c++) {
                        if (r > c) coords.push({r, c});
                    }
                }
                animateElements(coords);
            };

            return (
                <div className="w-full max-w-5xl mx-auto flex flex-col md:flex-row gap-8 items-start">
                    <div className="w-full md:w-1/3 space-y-4">
                        <div className="neon-border p-4 bg-gray-900 bg-opacity-80">
                            <h3 className="text-xl font-bold text-matrix-green mb-4 border-b border-gray-700 pb-2">Контролен Панел</h3>
                            <div className="space-y-2">
                                <button onClick={traverseRows} disabled={isAnimating} className="w-full text-left px-3 py-2 border border-gray-600 hover:border-matrix-green hover:text-matrix-green disabled:opacity-30 transition flex items-center gap-2">
                                    <PlayIcon size={16}/> Обходи по редове
                                </button>
                                <button onClick={traverseCols} disabled={isAnimating} className="w-full text-left px-3 py-2 border border-gray-600 hover:border-matrix-green hover:text-matrix-green disabled:opacity-30 transition flex items-center gap-2">
                                    <PlayIcon size={16}/> Обходи по стълбове
                                </button>
                                <button onClick={traverseMainDiag} disabled={isAnimating} className="w-full text-left px-3 py-2 border border-gray-600 hover:border-matrix-blue hover:text-matrix-blue disabled:opacity-30 transition flex items-center gap-2 text-blue-200">
                                    <PlayIcon size={16}/> Главен диагонал
                                </button>
                                <button onClick={traverseBelowMainDiag} disabled={isAnimating} className="w-full text-left px-3 py-2 border border-gray-600 hover:border-yellow-400 hover:text-yellow-400 disabled:opacity-30 transition flex items-center gap-2 text-yellow-100">
                                    <PlayIcon size={16}/> Под главния диагонал
                                </button>
                            </div>
                            <button onClick={resetGrid} className="mt-4 w-full py-2 bg-red-900/30 border border-red-500 text-red-400 hover:bg-red-900/50">Стоп / Изчисти</button>
                        </div>

                        <div className="neon-border-blue p-4 bg-black">
                            <h4 className="text-matrix-blue font-bold mb-2">DEBUG_INFO</h4>
                            <div className="font-mono text-xl space-y-1">
                                <p>int i = <span className="text-white">{loopInfo.i}</span>; <span className="text-gray-500">// Row</span></p>
                                <p>int j = <span className="text-white">{loopInfo.j}</span>; <span className="text-gray-500">// Col</span></p>
                                <p className="text-sm text-gray-400 mt-2">{activeCell ? `Processing matrix[${activeCell.r}, ${activeCell.c}]` : 'Idle...'}</p>
                            </div>
                        </div>
                    </div>

                    <div className="w-full md:w-2/3 flex flex-col items-center">
                         <div className="relative p-6 border-2 border-dashed border-gray-800 rounded bg-gray-900 bg-opacity-50">
                             {/* Column Indices */}
                             <div className="flex ml-12 mb-2">
                                {Array(size).fill().map((_, i) => (
                                    <div key={i} className="w-12 text-center text-gray-500 font-mono text-sm">j={i}</div>
                                ))}
                             </div>
                             
                             {Array(size).fill().map((_, r) => (
                                 <div key={r} className="flex items-center mb-2">
                                     {/* Row Index */}
                                     <div className="w-10 text-right mr-2 text-gray-500 font-mono text-sm">i={r}</div>
                                     
                                     {/* Row Cells */}
                                     <div className="flex">
                                         {Array(size).fill().map((_, c) => {
                                             const isActive = activeCell?.r === r && activeCell?.c === c;
                                             const isMainDiag = r === c && !isActive;
                                             
                                             let cellClass = "w-12 h-12 flex items-center justify-center border mr-1 font-mono text-lg transition-all duration-200 ";
                                             
                                             if (isActive) {
                                                 cellClass += "bg-matrix-green text-black border-matrix-green shadow-[0_0_15px_#00ff41] scale-110 z-10";
                                             } else {
                                                 cellClass += "bg-black border-gray-800 text-gray-600";
                                             }
                                             
                                             return (
                                                 <div key={`${r}-${c}`} className={cellClass}>
                                                     {r},{c}
                                                 </div>
                                             );
                                         })}
                                     </div>
                                 </div>
                             ))}
                         </div>
                         <p className="mt-4 text-gray-400 italic text-sm">Визуализация на двумерен масив `int[{size},{size}]`</p>
                    </div>
                </div>
            );
        };

        const MatrixGame = () => {
            const size = 5;
            const [score, setScore] = useState(0);
            const [target, setTarget] = useState(null); // { type: 'single' | 'diag' | 'revDiag', r, c, label }
            const [message, setMessage] = useState("Натисни Старт за да започнеш!");
            const [gameState, setGameState] = useState('idle'); // idle, playing
            const [selectedCells, setSelectedCells] = useState([]);

            const generateTask = () => {
                const tasks = [
                    { type: 'single', r: Math.floor(Math.random()*size), c: Math.floor(Math.random()*size) },
                    { type: 'diag', label: "всички елементи от Главния диагонал" },
                    { type: 'revDiag', label: "всички елементи от Обратния диагонал" },
                    { type: 'row', r: Math.floor(Math.random()*size), label: `всички от Ред` },
                    { type: 'col', c: Math.floor(Math.random()*size), label: `всички от Колона` }
                ];
                
                // Randomize tasks heavily weighted towards single clicks for simplicity first
                const r = Math.random();
                let task;
                if (r > 0.7) task = tasks[0]; // Single cell
                else if (r > 0.55 && r <= 0.7) task = tasks[1];
                else if (r > 0.4 && r <= 0.55) task = tasks[2];
                else if (r > 0.2 && r <= 0.4) task = tasks[3];
                else task = tasks[4];

                // Override label manually for single points
                if (task.type === 'single') task.label = `елемент с индекс [${task.r}, ${task.c}]`;
                if (task.type === 'row') task.label = `цял ред с индекс ${task.r}`;
                if (task.type === 'col') task.label = `цял стълб с индекс ${task.c}`;

                setTarget(task);
                setMessage(`Задача: Избери ${task.label}`);
                setSelectedCells([]);
            };

            const startGame = () => {
                setScore(0);
                setGameState('playing');
                generateTask();
            };

            const handleCellClick = (r, c) => {
                if (gameState !== 'playing') return;

                let isCorrect = false;
                let isTaskComplete = false;

                if (target.type === 'single') {
                    if (r === target.r && c === target.c) {
                        setScore(s => s + 50);
                        setMessage("Браво! +50т");
                        isTaskComplete = true;
                    } else {
                        setScore(s => s - 10);
                        setMessage("Грешка! Опитай пак.");
                    }
                } else if (target.type === 'diag') {
                    if (r === c) {
                        // Check if already selected
                        if (!selectedCells.some(cell => cell.r === r && cell.c === c)) {
                            const newSelected = [...selectedCells, {r, c}];
                            setSelectedCells(newSelected);
                            if (newSelected.length === size) {
                                setScore(s => s + 100);
                                setMessage("Диагоналът е попълнен! +100т");
                                isTaskComplete = true;
                            }
                        }
                    } else {
                        setScore(s => s - 10); 
                    }
                } else if (target.type === 'revDiag') {
                     if (r + c === size - 1) {
                         if (!selectedCells.some(cell => cell.r === r && cell.c === c)) {
                            const newSelected = [...selectedCells, {r, c}];
                            setSelectedCells(newSelected);
                            if (newSelected.length === size) {
                                setScore(s => s + 100);
                                isTaskComplete = true;
                            }
                        }
                     } else { setScore(s => s - 10); }
                } else if (target.type === 'row') {
                    if (r === target.r) {
                        if (!selectedCells.some(cell => cell.r === r && cell.c === c)) {
                            const newSelected = [...selectedCells, {r, c}];
                            setSelectedCells(newSelected);
                            if (newSelected.length === size) {
                                setScore(s => s + 80);
                                isTaskComplete = true;
                            }
                        }
                    } else { setScore(s => s - 10); }
                } else if (target.type === 'col') {
                    if (c === target.c) {
                        if (!selectedCells.some(cell => cell.r === r && cell.c === c)) {
                            const newSelected = [...selectedCells, {r, c}];
                            setSelectedCells(newSelected);
                            if (newSelected.length === size) {
                                setScore(s => s + 80);
                                isTaskComplete = true;
                            }
                        }
                    } else { setScore(s => s - 10); }
                }

                if (isTaskComplete) {
                    setTimeout(generateTask, 1000);
                }
            };

            return (
                <div className="w-full max-w-4xl mx-auto flex flex-col items-center">
                    <div className="flex justify-between w-full mb-4 items-center bg-gray-900 p-4 neon-border rounded">
                         <div>
                            <h3 className="text-xl font-bold text-yellow-400">Точки: {score}</h3>
                            <p className="text-sm text-gray-400">Цел: Висок резултат</p>
                         </div>
                         <div className="text-center flex-grow mx-4">
                             <div className="text-lg font-bold text-white mb-1 animate-pulse">{message}</div>
                         </div>
                         <button onClick={startGame} className="px-6 py-2 bg-matrix-green text-black font-bold hover:bg-white transition">
                             {gameState === 'idle' ? 'СТАРТ' : 'НОВА ИГРА'}
                         </button>
                    </div>

                    <div className="grid grid-cols-5 gap-2 p-4 bg-gray-900 rounded border border-gray-700">
                        {Array(size).fill().map((_, r) => (
                            Array(size).fill().map((_, c) => {
                                const isSelected = selectedCells.some(cell => cell.r === r && cell.c === c);
                                return (
                                    <div 
                                        key={`${r}-${c}`}
                                        onClick={() => handleCellClick(r, c)}
                                        className={`w-16 h-16 flex items-center justify-center font-mono text-xl cursor-pointer transition transform hover:scale-105
                                            ${isSelected ? 'bg-matrix-green text-black' : 'bg-black border border-gray-600 text-gray-400 hover:border-matrix-green hover:text-white'}
                                        `}
                                    >
                                        [{r},{c}]
                                    </div>
                                );
                            })
                        ))}
                    </div>
                </div>
            );
        };

        const Quiz = () => {
             const [answers, setAnswers] = useState({});
             const [showResults, setShowResults] = useState(false);

             const handleSelect = (qIdx, aIdx) => {
                 if (showResults) return;
                 setAnswers(prev => ({...prev, [qIdx]: aIdx}));
             };

             const calculateScore = () => {
                 let score = 0;
                 quizQuestions.forEach((q, idx) => {
                     if (answers[idx] === q.correct) score++;
                 });
                 return score;
             };

             return (
                 <div className="max-w-3xl mx-auto">
                     <h2 className="text-2xl font-bold text-center mb-6 text-matrix-green">Тест на знанията</h2>
                     <div className="space-y-6">
                         {quizQuestions.map((q, idx) => (
                             <div key={idx} className="bg-gray-900 p-4 border border-gray-700 rounded">
                                 <p className="font-bold mb-3 text-white">{idx + 1}. {q.q}</p>
                                 <div className="space-y-2">
                                     {q.a.map((option, aIdx) => {
                                         let btnClass = "w-full text-left px-4 py-2 rounded transition border ";
                                         if (showResults) {
                                             if (aIdx === q.correct) btnClass += "bg-green-900 border-green-500 text-white ";
                                             else if (answers[idx] === aIdx && aIdx !== q.correct) btnClass += "bg-red-900 border-red-500 text-white ";
                                             else btnClass += "bg-gray-800 border-gray-700 text-gray-400 opacity-50 ";
                                         } else {
                                             if (answers[idx] === aIdx) btnClass += "bg-matrix-blue-dim border-matrix-blue text-white ";
                                             else btnClass += "bg-gray-800 border-gray-700 hover:bg-gray-700 text-gray-300 ";
                                         }

                                         return (
                                             <button 
                                                 key={aIdx} 
                                                 onClick={() => handleSelect(idx, aIdx)}
                                                 className={btnClass}
                                             >
                                                 {option}
                                             </button>
                                         );
                                     })}
                                 </div>
                             </div>
                         ))}
                     </div>
                     <div className="mt-8 text-center pb-12">
                         {!showResults ? (
                             <button onClick={() => setShowResults(true)} className="px-8 py-3 bg-matrix-green text-black font-bold text-xl rounded hover:bg-white transition">
                                 Предай теста
                             </button>
                         ) : (
                             <div className="text-3xl font-bold text-white neon-text">
                                 Резултат: {calculateScore()} / {quizQuestions.length}
                             </div>
                         )}
                     </div>
                 </div>
             );
        };

        const Summary = () => (
            <div className="max-w-4xl mx-auto space-y-8 text-gray-200">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div className="neon-border p-6 bg-gray-900">
                        <h3 className="text-xl font-bold text-matrix-green mb-4 flex items-center gap-2"><CodeIcon/> Обобщение на Индексите</h3>
                        <table className="w-full text-left text-sm">
                            <thead>
                                <tr className="border-b border-gray-700 text-gray-400 uppercase">
                                    <th className="py-2">Зона</th>
                                    <th className="py-2">Условие</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-800 font-mono">
                                <tr><td className="py-2 text-white">Главен диагонал</td><td className="text-matrix-green">i == j</td></tr>
                                <tr><td className="py-2 text-white">Под главен диагонал</td><td className="text-yellow-400">i &gt; j</td></tr>
                                <tr><td className="py-2 text-white">Над главен диагонал</td><td className="text-blue-400">i &lt; j</td></tr>
                                <tr><td className="py-2 text-white">Обратен диагонал</td><td className="text-purple-400">i + j == n - 1</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div className="neon-border p-6 bg-gray-900">
                        <h3 className="text-xl font-bold text-matrix-blue mb-4 flex items-center gap-2"><BrainIcon/> Знаеш ли, че?</h3>
                        <div className="space-y-4">
                            <p>🖼️ <span className="font-bold text-white">Дигиталните изображения</span> са просто огромни матрици от пиксели. Всяка снимка, която виждаш в Instagram, е 2D масив, където всяка клетка пази цвят (RGB).</p>
                            <div className="h-16 flex gap-1">
                                {Array(20).fill().map((_, i) => (
                                    <div key={i} className="flex-1 bg-gradient-to-b from-red-500 via-green-500 to-blue-500 opacity-50"></div>
                                ))}
                            </div>
                            <p>🧩 <span className="font-bold text-white">Sudoku</span> е класически пример за логическа игра базирана на 9x9 матрица.</p>
                        </div>
                    </div>
                </div>
            </div>
        );

        function App() {
            const [tab, setTab] = useState('learn');

            const navItems = [
                { id: 'learn', label: 'Научи', icon: <CodeIcon size={18}/> },
                { id: 'lab', label: 'Лаборатория', icon: <GridIcon size={18}/> },
                { id: 'game', label: 'Matrix Master', icon: <GamepadIcon size={18}/> },
                { id: 'quiz', label: 'Тест', icon: <CheckCircleIcon size={18}/> },
                { id: 'summary', label: 'Обобщение', icon: <BrainIcon size={18}/> }
            ];

            return (
                <div className="min-h-screen matrix-bg flex flex-col">
                    <header className="border-b border-matrix-green bg-black bg-opacity-90 p-4 sticky top-0 z-50 backdrop-blur-sm">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
                            <h1 className="text-3xl font-bold neon-text mb-4 md:mb-0 tracking-tighter">
                                MATRIX_<span className="text-white">LEARN</span><span className="text-xs text-matrix-green align-top ml-1">v.1.0</span>
                            </h1>
                            <nav className="flex gap-2 flex-wrap justify-center">
                                {navItems.map(item => (
                                    <button
                                        key={item.id}
                                        onClick={() => setTab(item.id)}
                                        className={`flex items-center gap-2 px-4 py-2 rounded border transition-all duration-300 ${
                                            tab === item.id 
                                            ? 'bg-matrix-green text-black border-matrix-green font-bold shadow-[0_0_10px_#00ff41]' 
                                            : 'bg-transparent text-matrix-green border-transparent hover:border-matrix-green-dim hover:bg-gray-900'
                                        }`}
                                    >
                                        {item.icon}
                                        {item.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="flex-grow p-4 md:p-8 max-w-6xl mx-auto w-full">
                        {tab === 'learn' && <LearnSection />}
                        {tab === 'lab' && <Visualizer />}
                        {tab === 'game' && <MatrixGame />}
                        {tab === 'quiz' && <Quiz />}
                        {tab === 'summary' && <Summary />}
                    </main>

                    <footer className="text-center p-4 text-xs text-gray-600 border-t border-gray-900 bg-black">
                        <p>SYSTEM_STATUS: ONLINE | CLASS: 11 | SUBJECT: INFORMATICS | MODULE: C# ARRAYS</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
